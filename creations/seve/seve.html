/* v0.1.alpha — correctif UX mobile : navigation solide, header compact, aucun chevauchement */
#mainNav{
  display:flex !important;
  flex-wrap:nowrap !important;
  overflow-x:auto !important;
  overflow-y:hidden !important;
  white-space:nowrap !important;
  max-width:100% !important;
  -webkit-overflow-scrolling:touch;
  scroll-snap-type:x proximity;
  scrollbar-width:none;
  border-top:1px solid rgba(79,154,109,.08);
}
#mainNav::-webkit-scrollbar{display:none}
#mainNav button{
  flex:0 0 auto !important;
  min-width:max-content !important;
  max-width:none !important;
  white-space:nowrap !important;
  overflow:visible !important;
  text-overflow:clip !important;
  display:inline-flex !important;
  align-items:center;
  justify-content:center;
  line-height:1.05;
  scroll-snap-align:start;
  min-height:30px;
}
.nav-short{display:none}
.ref-toc,.pillar-chips{
  min-width:0;
  max-width:100%;
  overflow-x:auto !important;
  overflow-y:hidden !important;
  flex-wrap:nowrap !important;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.ref-toc::-webkit-scrollbar,.pillar-chips::-webkit-scrollbar{display:none}
.ref-toc-btn,.pillar-chip{
  flex:0 0 auto;
  white-space:nowrap;
  max-width:85vw;
  overflow:hidden;
  text-overflow:ellipsis;

function setup(){const done=state.data.settings.setupDone;const progress=[!!state.data.settings.mode,state.data.classes.length>0,state.data.packs.length>0||state.data.content.activities.length>0,activeChildren().length>0].filter(Boolean).length;return `${title('Première installation','4 étapes essentielles + un didacticiel optionnel pour ouvrir le jardin sans se perdre dans les menus.')}<div class="micro-help"><p><strong>Chemin conseillé :</strong> choisis le mode d’usage, crée une classe, importe un pack pédagogique, puis ajoute un enfant ou explore la démo.</p></div><div class="card soft"><div class="split"><div><h3>Progression</h3><p class="muted">${progress}/4 étapes essentielles réalisées. ${done?'Installation marquée comme terminée.':''}</p><div class="progress"><span style="width:${progress*25}%"></span></div></div><button onclick="App.finishSetup()">Marquer comme terminé</button></div></div><div class="grid two" style="margin-top:1rem"><div class="card"><h3>1. Mode d’usage</h3><p class="muted">${esc(modeDescription(state.data.settings.mode||'neutre'))}</p><select id="setupMode" onchange="App.setMode(this.value)"><option value="neutre" ${state.data.settings.mode==='neutre'?'selected':''}>Neutre pédagogique</option><option value="symbolique" ${state.data.settings.mode==='symbolique'?'selected':''}>Symbolique doux</option><option value="avance" ${state.data.settings.mode==='avance'?'selected':''}>Symbolique avancé</option></select><p class="tiny muted">Tu peux changer cela plus tard dans Éthique.</p></div><div class="card"><h3>2. Première classe</h3><label>Nom de la classe</label><input id="setupClass" placeholder="Ex : Groupe des graines"><button class="secondary" onclick="App.addClassFromSetup()">Créer la classe</button></div><div class="card"><h3>3. Pack pédagogique</h3><p class="muted">Un pack est une bibliothèque importable. Il ajoute du contenu pédagogique sans modifier tes enfants ni tes observations.</p><button class="secondary" onclick="App.setTab('packs')">Ouvrir les packs</button></div><div class="card"><h3>4. Premier enfant ou démo</h3><p class="muted">Ajout rapide pour commencer, cartographie sensible plus tard.</p><div class="row"><button class="secondary" onclick="App.setTab('children')">Ajouter enfant</button><button class="ghost" onclick="App.enterDemo()">Démo temporaire</button></div></div></div><div class="card" style="margin-top:1rem"><h3>5. Aide optionnelle</h3><p>Le didacticiel explique les familles d’onglets et le flux d’usage, sans obligation.</p><button onclick="App.startTutorial()">Lancer le didacticiel</button></div>`}

function humanKey(k){const map={
  germination:'Germination',fragility:'Fragilité',fragilite:'Fragilité',expansion:'Expansion',radiance:'Rayonnement',rayonnement:'Rayonnement',
  hypersensitive:'Enfant hypersensible',hypersensible:'Enfant hypersensible',active:'Enfant très moteur',moteur:'Enfant très moteur',discreet:'Enfant discret',discret:'Enfant discret',agitatedGroup:'Groupe agité',groupeAgite:'Groupe agité',
  pedagogicalIntention:'Intention pédagogique',centralQuestion:'Question centrale',questionsForChild:'Questions à poser à l’enfant',adultPhrases:'Phrases adultes utiles',frequentSituations:'Situations fréquentes',nextSteps:'Prochaines marches',ageAdaptations:'Adaptations par âge',protects:'Ce que ce pilier protège',develops:'Ce que ce pilier développe',practices:'Pratiques simples',links:'Liens avec les autres piliers',needs:'Besoins',avoid:'À éviter',
  interests:'Passions / intérêts',strengths:'Forces',keywords:'Mots-clés',contexts:'Contextes',triggers:'Déclencheurs possibles',supports:'Soutiens',formats:'Formats',lessonDurations:'Durées de leçon',councilRoles:'Rôles du Conseil',symbolicGuides:'Guides symboliques',birth:'Naissance',date:'Date',time:'Heure',place:'Lieu',reliability:'Fiabilité',usage:'Usage',numerology:'Numérologie',lifePath:'Chemin de vie',birthDay:'Jour de naissance',personalYear:'Année personnelle',astrology:'Astrologie',tropical:'Astrologie classique / tropicale',sidereal:'Astrologie sidérale',sun:'Soleil',moon:'Lune',asc:'Ascendant',mercury:'Mercure',venus:'Vénus',mars:'Mars',earth:'Terre',elements:'Éléments dominants',modalities:'Modalités',houses:'Maisons importantes',aspects:'Aspects marquants',humanDesign:'Design Humain',type:'Type',strategy:'Stratégie',authority:'Autorité',profile:'Profil',cross:'Croix d’incarnation',definedCenters:'Centres définis',openCenters:'Centres ouverts / non définis',channels:'Canaux',gates:'Portes',consciousSun:'Soleil conscient',consciousEarth:'Terre consciente',unconsciousSun:'Soleil inconscient',unconsciousEarth:'Terre inconsciente',variables:'Variables',environment:'Environnement',determination:'Détermination',wounds:'Blessures de l’âme',enneagram:'Ennéagramme',mbti:'MBTI',confirmations:'Confirmation par observation',status:'Statut',notes:'Notes',
  neutre:'Neutre pédagogique',symbolique:'Symbolique doux',avance:'Symbolique avancé'
};return map[k]||String(k).replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}
function modeDescription(mode){return mode==='symbolique'?'Quelques profils ou symboles peuvent servir d’hypothèses à vérifier dans le vivant : numérologie par date, astrologie, Design Humain ou autres miroirs.':mode==='avance'?'Lecture symbolique plus complète : astrologie tropicale/sidérale, Design Humain, blessures, ennéagramme ou MBTI, toujours sans étiqueter.':'Usage scolaire classique : observation, besoins, piliers, leçons, sans profils symboliques.'}
function glossaryBlock(){return `<div class="card soft"><h3>Petit lexique de Sève</h3><div class="def-list"><div class="def-item"><strong>Situation</strong><span class="muted tiny">Ce que tu rencontres en classe.</span></div><div class="def-item"><strong>Observation</strong><span class="muted tiny">Un fait + une hypothèse de besoin.</span></div><div class="def-item"><strong>Activité</strong><span class="muted tiny">Une ressource prête à essayer.</span></div><div class="def-item"><strong>Leçon</strong><span class="muted tiny">Une séance adaptée à ton groupe.</span></div><div class="def-item"><strong>Marche</strong><span class="muted tiny">Une petite étape concrète.</span></div></div></div>`}
function usageMap(){return `<div class="usage-map"><div class="usage-group"><h4>1. Démarrer</h4><p>Accueil · Installation · Packs</p></div><div class="usage-group"><h4>2. Comprendre</h4><p>Référentiel · Formation · Recherche</p></div><div class="usage-group"><h4>3. Suivre</h4><p>Enfants · Miroirs · Observations · Voix · Marches</p></div><div class="usage-group"><h4>4. Agir</h4><p>Bibliothèque · Leçons · Conseil</p></div><div class="usage-group"><h4>5. Protéger</h4><p>Rapports · Listes · Données</p></div></div>`}
function itemTitle(k,it,i){if(!it||typeof it!=='object')return 'Élément '+(i+1);if(k==='avoidPhrases')return (it.avoid||it.text)?('À éviter : '+String(it.avoid||it.text).slice(0,95)):(it.instead?('Dire plutôt : '+String(it.instead).slice(0,95)):('Reformulation '+(i+1)));if(k==='phrases')return it.context?String(it.context):String(it.title||it.text||it.body||('Phrase '+(i+1))).slice(0,110);if(k==='pillarReferentials')return it.title||pillar(it.id).title||('Pilier détaillé '+(i+1));if(k==='pillarsInfo')return it.title||pillar(it.id).title||('Pilier '+(i+1));if(k==='teacherTraining')return it.title||it.name||('Module de formation '+(i+1));if(k==='symbolicGuides')return it.title||it.name||((it.system?humanKey(it.system)+' · ':'')+'Guide symbolique '+(i+1));if(k==='activities'||k==='sequences'||k==='situations')return it.title||it.name||('Élément '+(i+1));return it.title||it.name||it.text||it.id||('Élément '+(i+1))}
function itemSummary(k,it){if(!it||typeof it!=='object')return '';if(k==='avoidPhrases')return [it.instead?('Dire plutôt : '+it.instead):'',it.pillarId?('Pilier : '+pillar(it.pillarId).title):''].filter(Boolean).join(' · ');if(k==='phrases')return it.text||it.body||it.intention||'';if(k==='pillarReferentials')return it.centralQuestion||it.essence||it.short||'';if(k==='teacherTraining')return it.remember||it.body||it.description||it.intention||'';if(k==='symbolicGuides')return (it.observe||[]).slice(0,2).join(' · ')||it.description||it.body||'';return it.essence||it.intention||it.body||it.description||it.centralQuestion||it.reading||it.pillarId||''}
function packs(){return `${title('Packs / bibliothèques pédagogiques','Prévisualiser, comprendre, importer, désinstaller et exporter des graines pédagogiques propres.')}<div class="micro-help"><p><strong>Un pack ajoute du contenu pédagogique</strong> : référentiel, formation, guides symboliques, activités, séquences, situations, phrases, listes ou démo. Il ne modifie pas les enfants ni les observations existantes. Tu choisis précisément ce que tu importes.</p><p><strong>Désinstaller un pack</strong> retire ses contenus pédagogiques, sans supprimer les données enfants.</p></div><div class="grid two"><div class="card"><h3>Importer un fichier pack JSON</h3><p class="muted">Sève valide les types de contenu, affiche des libellés humains et ignore les éléments non utilisés.</p><input type="file" accept="application/json,.json" onchange="App.previewPack(this.files[0])"><div id="packPreview"></div></div><div class="card"><h3>Packs importés</h3>${state.data.packs.length?state.data.packs.map(p=>`<div class="card"><div class="split"><div><h4>${esc(p.name)}</h4><p class="muted">${esc(p.version||'')} · ${esc(p.date||'')}</p><p>${tags((p.modules||[]).map(k=>moduleLabels[k]||k))}</p></div><button class="danger small" onclick="App.uninstallPack('${p.id}')">Désinstaller</button></div></div>`).join(''):'<div class="empty">Aucun pack importé.</div>'}<div class="divider"></div><h3>Exporter un pack personnalisé</h3><p class="muted">Exporte tes contenus pédagogiques, sans données enfants ni métadonnées internes.</p><button class="secondary" onclick="App.exportCustomPack()">Exporter mon pack</button></div></div>`}
const moduleLabels={lists:'Listes',pillarsInfo:'Contenus courts des piliers',pillarReferentials:'Référentiel complet des 12 piliers',activities:'Activités',sequences:'Séquences',situations:'Situations',phrases:'Phrases adultes',avoidPhrases:'À éviter / reformuler',teacherTraining:'Formation enseignant',symbolicGuides:'Guides miroirs symboliques',demo:'Données démo'};
const visiblePackModules=['lists','pillarsInfo','pillarReferentials','activities','sequences','situations','phrases','avoidPhrases','teacherTraining','symbolicGuides','demo'];
const arrayPackModules=['pillarsInfo','pillarReferentials','activities','sequences','situations','phrases','avoidPhrases','teacherTraining','symbolicGuides'];
function packCount(k,m){return k==='lists'?(m.lists?Object.values(m.lists).reduce((n,a)=>n+(Array.isArray(a)?a.length:0),0):0):k==='demo'?(m.demo?1:0):(Array.isArray(m[k])?m[k].length:0)}
function packSummary(pack){const m=pack.modules||{};const out={};visiblePackModules.forEach(k=>{const c=packCount(k,m);if(c)out[k]=c});return out}
function validatePack(pack){const m=pack.modules||{};const warnings=[];const errors=[];if(!pack||typeof pack!=='object')errors.push('Le fichier ne contient pas un objet JSON utilisable.');if(!m||typeof m!=='object')errors.push('Le pack ne contient pas de champ modules.');if(pack.schema&&!String(pack.schema).startsWith('seve.contentPack.v'))warnings.push('Schéma inhabituel : '+pack.schema);if(!pack.schema)warnings.push('Schéma non indiqué : import possible, mais moins traçable.');const unknown=Object.keys(m).filter(k=>!visiblePackModules.includes(k)&&k!=='cards');if(unknown.length)warnings.push('Modules non reconnus ignorés : '+unknown.join(', '));if(Array.isArray(m.cards)&&m.cards.length)warnings.push('Module cartes détecté mais masqué/ignoré dans cette branche de Sève.');arrayPackModules.forEach(k=>{if(m[k]!==undefined&&!Array.isArray(m[k]))errors.push(`Le module ${moduleLabels[k]||k} doit être une liste.`)});if(m.lists&&typeof m.lists!=='object')errors.push('Le module Listes doit être un objet de listes.');const seen={};arrayPackModules.forEach(k=>{(Array.isArray(m[k])?m[k]:[]).forEach((it,i)=>{if(!it||typeof it!=='object'){warnings.push(`${moduleLabels[k]} élément ${i+1} n’est pas un objet.`);return}if(!it.id){warnings.push(`${moduleLabels[k]} : un élément sans id recevra un identifiant automatique.`);return}const key=k+'::'+it.id;if(seen[key])warnings.push(`Doublon interne dans ${moduleLabels[k]} : ${it.id}`);seen[key]=true;const existing=(state.data.content[k]||[]).find(x=>x.id===it.id);if(existing)warnings.push(`ID déjà présent localement dans ${moduleLabels[k]} : ${it.id}. Sève gardera les sources multiples pour éviter une désinstallation destructrice.`)})});return{errors,warnings,summary:packSummary(pack)}}
function validationHtml(v){const summary=Object.entries(v.summary).map(([k,c])=>`<span class="tag good">${esc(moduleLabels[k]||k)} : ${c}</span>`).join(' ');return `<div class="callout ${v.errors.length?'danger':(v.warnings.length?'warn':'good')}"><strong>Validation du pack</strong><p>${summary||'Aucun module importable détecté.'}</p>${v.errors.length?`<p><strong>Erreurs :</strong><br>${v.errors.map(esc).join('<br>')}</p>`:''}${v.warnings.length?`<p><strong>Points d’attention :</strong><br>${v.warnings.slice(0,12).map(esc).join('<br>')}${v.warnings.length>12?'<br>…':''}</p>`:''}</div>`}
function previewPack(file){if(!file)return;const r=new FileReader();r.onload=()=>{try{const pack=JSON.parse(r.result);state.pendingPack=pack;state.packElementSelection={};const m=pack.modules||{};const validation=validatePack(pack);state.pendingPackValidation=validation;let html=`<div class="callout"><strong>${esc(pack.name||'Pack JSON')}</strong><br>${esc(pack.description||pack.usageNote||'')}</div>${validationHtml(validation)}<div class="row"><button class="secondary small" onclick="App.packSelectAll(true)">Tout cocher</button><button class="ghost small" onclick="App.packSelectAll(false)">Tout décocher</button></div>`;visiblePackModules.forEach(k=>{const count=packCount(k,m);if(!count)return;html+=`<details class="card" open><summary><label class="chip selected"><input type="checkbox" id="imp_${k}" checked onchange="this.parentElement.classList.toggle('selected',this.checked)"> ${moduleLabels[k]||k} <span class="tag">${count}</span></label></summary>${packModuleItems(k,m[k])}</details>`});html+=validation.errors.length?`<button disabled>Import impossible : corriger le pack</button>`:`<button onclick="App.importSelectedPack()">Importer la sélection</button>`;document.getElementById('packPreview').innerHTML=html}catch(e){toast('Pack JSON illisible.')}};r.readAsText(file)}
function packModuleItems(k,val){if(k==='demo')return '<p class="muted">Importe des données de démonstration si le pack en contient.</p>';if(k==='lists'){return Object.entries(val||{}).map(([name,arr])=>`<details class="card"><summary><strong>${esc(humanKey(name))}</strong> <span class="tag">${(arr||[]).length}</span></summary>${tags(arr)}</details>`).join('')}const arr=Array.isArray(val)?val:[];return `<div class="pack-items">${arr.map((it,i)=>{const title=itemTitle(k,it,i);const summary=itemSummary(k,it);return `<label class="pack-item"><input type="checkbox" id="item_${k}_${i}" checked><span><strong>${esc(title)}</strong>${summary?`<span class="muted tiny">${esc(String(summary).slice(0,240))}</span>`:''}</span></label>`}).join('')}</div>`}
function packSelectAll(v){document.querySelectorAll('#packPreview input[type=checkbox]').forEach(x=>{x.checked=v;x.closest('label')?.classList.toggle('selected',v)})}
function selectedItems(k,arr){return (arr||[]).filter((_,i)=>document.getElementById('item_'+k+'_'+i)?.checked)}
function itemWithSource(it,packId,k){const clone={...it};if(!clone.id)clone.id=uid(k);const prev=Array.isArray(clone._packIds)?clone._packIds:(clone._packId?[clone._packId]:[]);clone._packIds=[...new Set([...prev,packId])];delete clone._packId;return clone}
function importSelectedPack(){const pack=state.pendingPack;if(!pack)return;const validation=validatePack(pack);if(validation.errors.length){toast('Import impossible : pack invalide.');return}const m=pack.modules||{};const packId=uid('pack');const contrib={lists:{}};const chosen=id=>document.getElementById('imp_'+id)?.checked;if(chosen('lists')&&m.lists){Object.entries(m.lists).forEach(([k,arr])=>{if(!state.data.content.lists[k])state.data.content.lists[k]=[];contrib.lists[k]=[];(arr||[]).forEach(v=>{if(!state.data.content.lists[k].includes(v)){state.data.content.lists[k].push(v);contrib.lists[k].push(v)}})})}arrayPackModules.forEach(k=>{if(chosen(k)&&Array.isArray(m[k])){const items=selectedItems(k,m[k]).map(it=>itemWithSource(it,packId,k));contrib[k]=items.map(it=>it.id).filter(Boolean);mergeById(state.data.content[k],items,packId)}});if(chosen('demo')&&m.demo){importDemo(m.demo,false);contrib.demo=true}state.data.packs.push({id:packId,name:pack.name||'pack',version:pack.version||'',schema:pack.schema||'',date:today(),modules:Object.keys(contrib).filter(k=>k!=='lists'||Object.keys(contrib.lists).length),warnings:validation.warnings.length});state.data.packContributions[packId]=contrib;save();state.pendingPack=null;toast(validation.warnings.length?'Import terminé avec points d’attention.':'Import terminé.');render()}
function mergeById(target,items,packId){items.forEach(it=>{const i=target.findIndex(x=>x.id&&it.id&&x.id===it.id);if(i>=0){const old=target[i];const ids=Array.isArray(old._packIds)?old._packIds:(old._packId?[old._packId]:[]);target[i]={...old,...it,_packIds:[...new Set([...ids,...(it._packIds||[]),packId])]};delete target[i]._packId}else target.push(it)})}
function uninstallPack(id){if(!confirm('Désinstaller ce pack ? Les contenus ajoutés uniquement par ce pack seront retirés. Les contenus partagés par plusieurs packs seront conservés.'))return;const c=state.data.packContributions[id]||{};Object.entries(c.lists||{}).forEach(([k,arr])=>{state.data.content.lists[k]=list(k).filter(v=>!arr.includes(v))});arrayPackModules.forEach(k=>{state.data.content[k]=state.data.content[k].flatMap(x=>{const ids=Array.isArray(x._packIds)?x._packIds:(x._packId?[x._packId]:[]);if(ids.includes(id)){const remaining=ids.filter(pid=>pid!==id);if(remaining.length){const y={...x,_packIds:remaining};delete y._packId;return[y]}return[]}return[x]})});state.data.packs=state.data.packs.filter(p=>p.id!==id);delete state.data.packContributions[id];save();render();toast('Pack désinstallé.')}

function importDemo(d,temp){(d.classes||[]).forEach(c=>{if(!state.data.classes.some(x=>x.id===c.id))state.data.classes.push({...c})});(d.children||[]).forEach(c=>{if(!state.data.children.some(x=>x.id===c.id))state.data.children.push(migrate({children:[c]}).children[0])});(d.observations||[]).forEach(o=>{if(!state.data.observations.some(x=>x.id===o.id))state.data.observations.push({...o})});if(!state.data.settings.activeClassId&&d.classes?.[0])state.data.settings.activeClassId=d.classes[0].id;if(!temp)save(false)}

function renderRefValue(v){

function mirrorSection(id,title,body,open=false){return `<details class="mirror-section" id="${id}" ${open?'open':''}><summary>${title}</summary><div class="mirror-body">${body}</div></details>`}
function mirrorQuickButtons(){return `<div class="mirror-quick"><button class="secondary small" onclick="document.getElementById('mir_sec_birth')?.setAttribute('open','')">Naissance</button><button class="secondary small" onclick="document.getElementById('mir_sec_trop')?.setAttribute('open','')">Astro classique</button><button class="secondary small" onclick="document.getElementById('mir_sec_sid')?.setAttribute('open','')">Astro sidérale</button><button class="secondary small" onclick="document.getElementById('mir_sec_hd')?.setAttribute('open','')">Design Humain</button><button class="secondary small" onclick="document.getElementById('mir_sec_summary')?.setAttribute('open','')">Synthèse</button></div>`}
function astroFields(prefix,a={},label=''){return `<div class="mirror-core-grid two"><div><label>Source du thème</label><input id="${prefix}Source" value="${esc(a.source||'')}" placeholder="Astro-Seek, parent, logiciel…"></div>${prefix==='sid'?`<div><label>Ayanamsa / système sidéral</label><input id="${prefix}Ayanamsa" value="${esc(a.ayanamsa||'Lahiri')}" placeholder="Lahiri, Fagan-Bradley…"></div>`:''}</div><div class="mirror-core-grid"><div><label>Soleil ${label}</label>${signSelect(prefix+'Sun',a.sun)}</div><div><label>Lune ${label}</label>${signSelect(prefix+'Moon',a.moon)}</div><div><label>Ascendant ${label}</label>${signSelect(prefix+'Asc',a.asc)}</div><div><label>Mercure</label>${signSelect(prefix+'Mercury',a.mercury)}</div><div><label>Vénus</label>${signSelect(prefix+'Venus',a.venus)}</div><div><label>Mars</label>${signSelect(prefix+'Mars',a.mars)}</div></div><div class="mirror-core-grid two"><div><label>Terre</label><input id="${prefix}Earth" value="${esc(a.earth||'')}" placeholder="Signe / porte / note utile"></div><div><label>Éléments dominants</label><input id="${prefix}Elements" value="${esc(a.elements||'')}" placeholder="Feu, terre, air, eau…"></div><div><label>Maison du Soleil</label><input id="${prefix}SunHouse" value="${esc(a.sunHouse||a.houses||'')}"></div><div><label>Maison de la Lune</label><input id="${prefix}MoonHouse" value="${esc(a.moonHouse||'')}"></div><div><label>Aspects marquants</label><textarea id="${prefix}Aspects">${esc(a.aspects||'')}</textarea></div><div><label>Notes libres</label><textarea id="${prefix}Notes">${esc(a.notes||'')}</textarea></div></div>`}
function getAstro(prefix){return{source:val(prefix+'Source'),ayanamsa:val(prefix+'Ayanamsa'),sun:val(prefix+'Sun'),moon:val(prefix+'Moon'),asc:val(prefix+'Asc'),mercury:val(prefix+'Mercury'),venus:val(prefix+'Venus'),mars:val(prefix+'Mars'),earth:val(prefix+'Earth'),elements:val(prefix+'Elements'),sunHouse:val(prefix+'SunHouse'),moonHouse:val(prefix+'MoonHouse'),aspects:val(prefix+'Aspects'),notes:val(prefix+'Notes')}}
function val(id){return (document.getElementById(id)?.value||'').trim()}
function checked(id){return !!document.getElementById(id)?.checked}

function mirrorGuideMatches(c){const m=mirrorDefaults(c.mirrors||{});const nums=calcNumerology(m.birth.date||'',m.numerology.referenceYear);const keys=[];if(nums.lifePath)keys.push('lifePath:'+nums.lifePath);if(nums.birthDay)keys.push('birthDay:'+nums.birthDay);['tropical','sidereal'].forEach(branch=>{const a=m.astrology?.[branch]||{};['sun','moon','asc','mercury','venus','mars','earth'].forEach(k=>{if(a[k]){keys.push(`${branch}:${k}:${a[k]}`);keys.push(`${k}:${a[k]}`);keys.push(`sign:${a[k]}`)}});if(a.elements)String(a.elements).split(/[,;\/]+/).map(x=>x.trim()).filter(Boolean).forEach(x=>keys.push(`element:${x}`))});const hd=m.humanDesign||{};if(hd.type)keys.push('hdType:'+hd.type);if(hd.authority)keys.push('hdAuthority:'+hd.authority);if(hd.profile)keys.push('hdProfile:'+hd.profile);(hd.definedCenters||[]).forEach(x=>keys.push('hdDefinedCenter:'+x));(hd.openCenters||[]).forEach(x=>keys.push('hdOpenCenter:'+x));(m.other?.wounds||[]).forEach(x=>keys.push('wound:'+x));if(m.other?.enneagram)keys.push('enneagram:'+m.other.enneagram);if(m.other?.mbti)keys.push('mbti:'+m.other.mbti.toUpperCase());return (state.data.content.symbolicGuides||[]).filter(g=>keys.includes(g.key)||keys.includes(g.match)||keys.includes(`${g.system}:${g.value}`)).slice(0,24)}
function mirrorSummary(c){const m=mirrorDefaults(c.mirrors||{});const nums=calcNumerology(m.birth.date||'',m.numerology.referenceYear);const bits=[];if(m.birth.date)bits.push(`Naissance : ${m.birth.date}`);if(nums.lifePath)bits.push(`Chemin de vie : ${nums.lifePath}`);if(m.astrology?.tropical?.sun)bits.push(`Soleil tropical : ${m.astrology.tropical.sun}`);if(m.astrology?.sidereal?.sun)bits.push(`Soleil sidéral : ${m.astrology.sidereal.sun}`);if(m.humanDesign?.type)bits.push(`HD : ${m.humanDesign.type}${m.humanDesign.authority?' · '+m.humanDesign.authority:''}`);return bits.length?tags(bits):'<span class="muted">Aucun miroir renseigné.</span>'}
function usefulMirrorHtml(c){const m=mirrorDefaults(c.mirrors||{});const nums=calcNumerology(m.birth.date||'',m.numerology.referenceYear);const lines=[];if(nums.lifePath)lines.push(['Besoin possible à observer',`Dynamique numérologique ${nums.lifePath} : observer ce qui nourrit l’élan de fond sans conclure.`]);if(m.astrology.tropical.moon||m.astrology.sidereal.moon)lines.push(['Climat émotionnel',`Observer les besoins de sécurité émotionnelle, notamment dans les transitions et après conflit.`]);if(m.humanDesign.authority)lines.push(['Décision / rythme',`Autorité renseignée : ${m.humanDesign.authority}. Observer si l’enfant gagne en clarté avec un certain rythme de décision.`]);if(m.humanDesign.openCenters?.length)lines.push(['Zones d’absorption possibles',`Centres ouverts : ${m.humanDesign.openCenters.join(', ')}. Observer les contextes où l’enfant amplifie l’ambiance du groupe.`]);if(m.other.wounds?.length)lines.push(['Grande délicatesse',`Blessures possiblement activées : ${m.other.wounds.join(', ')}. À manier comme pistes de sensibilité, jamais comme identité.`]);if(!lines.length)return '<p class="muted">Renseigne quelques miroirs pour faire apparaître une synthèse courte.</p>';return `<div class="card mirror-useful"><h3>Miroirs utiles maintenant</h3><p class="mirror-note">Lecture courte pour passer du profil à l’observation vivante.</p>${lines.map(([a,b])=>`<p><strong>${esc(a)} :</strong> ${esc(b)}</p>`).join('')}<div class="row"><button class="secondary small" onclick="App.createStepFromMirror('${c.id}')">Créer une prochaine marche depuis ces miroirs</button><button class="secondary small" onclick="App.selectChild('${c.id}','observations')">Ajouter une observation liée</button></div></div>`}
function mirrorGuidanceHtml(c){const guides=mirrorGuideMatches(c);return `<div class="symbolic-summary"><h3>Synthèse prudente</h3><p class="mirror-note">Le profil symbolique n’est pas une case. C’est une question posée au vivant.</p>${usefulMirrorHtml(c)}${guides.length?`<h4>Guidances issues des packs importés</h4>${guides.map(g=>`<details class="card"><summary><strong>${esc(g.title||g.name)}</strong> <span class="tag">${esc(humanKey(g.system||''))}</span></summary>${g.description?`<p>${esc(g.description)}</p>`:''}${g.observe?`<h4>À observer</h4><ul>${g.observe.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`:''}${g.postures?`<h4>Postures adultes possibles</h4><ul>${g.postures.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`:''}${g.phrases?`<h4>Phrases possibles</h4>${g.phrases.map(x=>`<div class="callout"><strong>${esc(x)}</strong></div>`).join('')}`:''}${g.avoid?`<h4>À éviter</h4><ul>${g.avoid.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`:''}</details>`).join('')}`:'<p class="muted tiny">Importe le pack “Miroirs symboliques approfondis” pour enrichir les questions d’observation et les postures adultes.</p>'}</div>`}
function mirrors(){const kids=activeChildren(true);let c=childById(state.selectedChildId)||kids[0];if(c)state.selectedChildId=c.id;const mode=state.data.settings.mode||'neutre';return `${title('Miroirs — compléter une fiche enfant','Date, naissance, Design Humain et autres miroirs servent à enrichir une fiche sensible, uniquement comme hypothèses à vérifier.')}<div class="micro-help"><p><strong>Garde-fou :</strong> les profils ne définissent pas l’enfant. Ils aident l’enseignant à poser de meilleures questions, puis l’observation vivante confirme, nuance ou contredit.</p><p><strong>Données sensibles :</strong> date, heure, lieu de naissance et miroirs psychologiques sont privés. Ils sont exclus des exports anonymisés, et masqués par défaut en mode neutre.</p></div><div class="card"><label>Enfant</label>${kids.length?childSelect('mirrorChild',c?.id||kids[0].id):'<select><option>Aucun enfant</option></select>'}<button class="secondary small" onclick="App.selectChild(document.getElementById('mirrorChild').value,'mirrors')">Afficher</button></div>${mode==='neutre'?`<div class="callout warn"><strong>Mode neutre pédagogique activé.</strong><p>Les miroirs symboliques sont volontairement masqués pour un usage scolaire classique. Pour les utiliser, ouvre Éthique et choisis “symbolique doux” ou “symbolique avancé”.</p></div>`:(c?mirrorForm(c,mode):'<div class="empty">Ajoute d’abord un enfant.</div>')}`}
function mirrorForm(c,mode='symbolique'){const m=mirrorDefaults(c.mirrors||{});const n=calcNumerology(m.birth.date||'',m.numerology.referenceYear);const trop=m.astrology.tropical||{};const sid=m.astrology.sidereal||{};const hd=m.humanDesign||{};const other=m.other||{};const advanced=mode==='avance'||mode==='symbolique avancé'||mode==='recherche personnelle';const soft=mode==='symbolique'||mode==='symbolique doux';const birthBody=`<div class="mirror-core-grid two"><div><label>Date de naissance</label><input id="mirBirthDate" type="date" value="${esc(m.birth.date)}" oninput="App.updateNumerologyPreview()"></div><div><label>Année de référence</label><input id="mirRefYear" type="number" value="${esc(m.numerology.referenceYear||new Date().getFullYear())}" oninput="App.updateNumerologyPreview()"></div><div><label>Heure</label><input id="mirBirthTime" type="time" value="${esc(m.birth.time)}"></div><div><label>Fiabilité de l’heure</label><select id="mirReliability"><option ${m.birth.reliability==='exacte'?'selected':''}>exacte</option><option ${m.birth.reliability==='approximative'?'selected':''}>approximative</option><option ${m.birth.reliability==='inconnue'?'selected':''}>inconnue</option></select></div><div><label>Lieu</label><input id="mirBirthPlace" value="${esc(m.birth.place)}" placeholder="Ville, pays"></div><div><label>Source / contexte</label><input id="mirBirthSource" value="${esc(m.birth.source||'')}" placeholder="famille, acte, estimation…"></div></div><p id="numPreview" class="callout"><strong>Calcul automatique :</strong> chemin de vie ${esc(n.lifePath||'—')} · jour ${esc(n.birthDay||'—')} · année personnelle ${esc(n.personalYear||'—')}</p><label>Notes numérologie</label><textarea id="mirNumNotes">${esc(m.numerology.notes||'')}</textarea>`;const tropBody=astroFields('trop',trop,'tropical');const sidBody=astroFields('sid',sid,'sidéral');const hdBody=`<div class="mirror-core-grid two"><div><label>Source du profil</label><input id="hdSource" value="${esc(hd.source||'')}" placeholder="logiciel, analyste, famille…"></div><div><label>Fiabilité</label><select id="hdReliability">${opt(['à vérifier','partiel','complet','confirmé par source fiable'],hd.reliability)}</select></div><div><label>Type</label><select id="hdType">${opt(HD_TYPES,hd.type)}</select></div><div><label>Autorité</label><select id="hdAuthority">${opt(HD_AUTHORITIES,hd.authority)}</select></div><div><label>Profil</label><select id="hdProfile">${opt(HD_PROFILES,hd.profile)}</select></div><div><label>Stratégie</label><input id="hdStrategy" value="${esc(hd.strategy)}" placeholder="Répondre, attendre invitation…"></div></div><label>Croix d’incarnation</label><input id="hdCross" value="${esc(hd.cross)}"><label>Centres définis</label><div id="hdDefined">${multiChecks('hdDefined',HD_CENTERS,hd.definedCenters)}</div><label>Centres ouverts / non définis</label><div id="hdOpen">${multiChecks('hdOpen',HD_CENTERS,hd.openCenters)}</div><div class="mirror-core-grid two"><div><label>Canaux</label><textarea id="hdChannels">${esc(hd.channels||'')}</textarea></div><div><label>Portes importantes</label><textarea id="hdGates">${esc(hd.gates||'')}</textarea></div><div><label>Soleil conscient</label><input id="hdConsciousSun" value="${esc(hd.consciousSun||'')}"></div><div><label>Terre consciente</label><input id="hdConsciousEarth" value="${esc(hd.consciousEarth||'')}"></div><div><label>Soleil inconscient</label><input id="hdUnconsciousSun" value="${esc(hd.unconsciousSun||'')}"></div><div><label>Terre inconsciente</label><input id="hdUnconsciousEarth" value="${esc(hd.unconsciousEarth||'')}"></div><div><label>Variables</label><input id="hdVariables" value="${esc(hd.variables||'')}"></div><div><label>Environnement</label><input id="hdEnvironment" value="${esc(hd.environment||'')}"></div><div><label>Détermination / digestion</label><input id="hdDetermination" value="${esc(hd.determination||'')}"></div><div><label>Notes libres</label><textarea id="hdNotes">${esc(hd.notes||'')}</textarea></div></div>`;const otherBody=`<p class="muted">À remplir seulement si c’est utile, évident, partagé avec prudence, et jamais comme identité de l’enfant.</p><label>Blessures possiblement activées</label><div id="mirWounds">${multiChecks('mirWounds',SOUL_WOUNDS,other.wounds)}</div><div class="mirror-core-grid two"><div><label>Tendance ennéagramme possible / mécanisme observé</label><input id="mirEnneagram" value="${esc(other.enneagram)}" placeholder="Ex : tendance 4, 6…"></div><div><label>MBTI / préférences observées, non définitives</label><input id="mirMbti" value="${esc(other.mbti)}" placeholder="Ex : INFP, ENFJ…"></div><div><label>Énergie : solitude / groupe</label><input id="prefEnergy" value="${esc(other.learningPrefs?.energy||'')}"></div><div><label>Traitement : concret / intuitif</label><input id="prefPerception" value="${esc(other.learningPrefs?.perception||'')}"></div><div><label>Décision : logique / relationnelle</label><input id="prefDecision" value="${esc(other.learningPrefs?.decision||'')}"></div><div><label>Organisation : structure / flexibilité</label><input id="prefStructure" value="${esc(other.learningPrefs?.structure||'')}"></div></div><label>Notes autres miroirs</label><textarea id="mirOtherNotes">${esc(other.notes||'')}</textarea>`;const conf=m.confirmations.items||{};const confirmBody=`<p class="muted">Confirme ou relativise chaque famille de miroirs à partir d’observations concrètes.</p><div class="confirm-grid"><label>Numérologie</label>${confirmSelect('confNumerology',conf.numerology)}<label>Astrologie</label>${confirmSelect('confAstrology',conf.astrology)}<label>Design Humain</label>${confirmSelect('confHd',conf.humanDesign)}<label>Autres miroirs</label>${confirmSelect('confOther',conf.other)}</div><label>Statut global</label><select id="mirStatus"><option ${m.confirmations.status==='non vérifié'?'selected':''}>non vérifié</option><option ${m.confirmations.status==='à observer'?'selected':''}>à observer</option><option ${m.confirmations.status==='partiellement confirmé'?'selected':''}>partiellement confirmé</option><option ${m.confirmations.status==='confirmé par plusieurs observations'?'selected':''}>confirmé par plusieurs observations</option><option ${m.confirmations.status==='non confirmé / à relativiser'?'selected':''}>non confirmé / à relativiser</option></select><label>Observations liées / notes de prudence</label><textarea id="mirConfirmNotes">${esc(m.confirmations.notes||'')}</textarea><div class="divider"></div><h4>Confidentialité</h4>${boolCheck('mirIncludeReports',m.privacy.includeInReports,'Inclure une synthèse des miroirs dans les rapports ordinaires')}${boolCheck('mirIncludeBirth',m.privacy.includeBirthDataInReports,'Inclure les données de naissance dans les rapports')}${boolCheck('mirIncludeSensitive',m.privacy.includeSensitiveInFamilyReports,'Inclure les miroirs sensibles dans les rapports famille')}`;return `<div class="card soft" style="margin-top:1rem"><h3>Cartographie de ${esc(childName(c))}</h3><p>${mirrorSummary(c)}</p>${mirrorQuickButtons()}</div>${mirrorSection('mir_sec_birth','1. Naissance & numérologie par date',birthBody,true)}${mirrorSection('mir_sec_trop','2. Astrologie classique / tropicale',tropBody,soft)}${mirrorSection('mir_sec_sid','3. Astrologie sidérale',sidBody,false)}${advanced?mirrorSection('mir_sec_hd','4. Design Humain',hdBody,false):'<div class="callout"><strong>Design Humain masqué en mode symbolique doux.</strong><p>Choisis le mode symbolique avancé pour renseigner type, autorité, profil, centres, canaux, portes et variables.</p></div>'}${advanced?mirrorSection('mir_sec_other','5. Autres miroirs optionnels',otherBody,false):''}${mirrorSection('mir_sec_confirm','6. Confirmation & confidentialité',confirmBody,false)}<div class="row" style="margin-top:1rem"><button onclick="App.saveMirrors('${c.id}')">Sauvegarder les miroirs</button><button class="secondary" onclick="App.createStepFromMirror('${c.id}')">Créer une prochaine marche</button><button class="secondary" onclick="App.selectChild('${c.id}','observations')">Ajouter une observation</button></div>${mirrorSection('mir_sec_summary','7. Synthèse & guidances',mirrorGuidanceHtml(c),true)}`}
function updateNumerologyPreview(){const n=calcNumerology(document.getElementById('mirBirthDate')?.value||'',document.getElementById('mirRefYear')?.value||'');const el=document.getElementById('numPreview');if(el)el.innerHTML=`<strong>Calcul automatique :</strong> chemin de vie ${esc(n.lifePath||'—')} · jour ${esc(n.birthDay||'—')} · année personnelle ${esc(n.personalYear||'—')} · référence ${esc(n.referenceYear||'—')}`}
function saveMirrors(id){const c=childById(id);if(!c)return;const birthDate=val('mirBirthDate');const refYear=val('mirRefYear')||String(new Date().getFullYear());const nums=calcNumerology(birthDate,refYear);c.mirrors=mirrorDefaults({birth:{date:birthDate,time:val('mirBirthTime'),place:val('mirBirthPlace'),reliability:val('mirReliability')||'inconnue',source:val('mirBirthSource'),usage:'privé'},numerology:{...nums,referenceYear:refYear,notes:val('mirNumNotes')},astrology:{tropical:getAstro('trop'),sidereal:getAstro('sid')},humanDesign:{source:val('hdSource'),reliability:val('hdReliability')||'à vérifier',type:val('hdType'),authority:val('hdAuthority'),profile:val('hdProfile'),strategy:val('hdStrategy'),cross:val('hdCross'),definedCenters:selectedChecks('hdDefined'),openCenters:selectedChecks('hdOpen'),channels:val('hdChannels'),gates:val('hdGates'),consciousSun:val('hdConsciousSun'),consciousEarth:val('hdConsciousEarth'),unconsciousSun:val('hdUnconsciousSun'),unconsciousEarth:val('hdUnconsciousEarth'),variables:val('hdVariables'),environment:val('hdEnvironment'),determination:val('hdDetermination'),notes:val('hdNotes')},other:{wounds:selectedChecks('mirWounds'),enneagram:val('mirEnneagram'),mbti:val('mirMbti'),learningPrefs:{energy:val('prefEnergy'),perception:val('prefPerception'),decision:val('prefDecision'),structure:val('prefStructure')},notes:val('mirOtherNotes')},confirmations:{status:val('mirStatus')||'non vérifié',notes:val('mirConfirmNotes'),items:{numerology:val('confNumerology'),astrology:val('confAstrology'),humanDesign:val('confHd'),other:val('confOther')}},privacy:{includeInReports:checked('mirIncludeReports'),includeBirthDataInReports:checked('mirIncludeBirth'),includeSensitiveInFamilyReports:checked('mirIncludeSensitive')}});save();render();toast('Miroirs sauvegardés.')}
function createStepFromMirror(id){const c=childById(id);if(!c)return;const m=mirrorDefaults(c.mirrors||{});let text='Observer une piste issue des miroirs symboliques, sans conclure, puis vérifier ce qui aide réellement l’enfant.';if(m.humanDesign.authority)text=`Laisser un temps adapté avant certaines décisions, puis observer si ${childName(c)} retrouve plus de clarté intérieure.`;else if(m.astrology.tropical.moon||m.astrology.sidereal.moon)text=`Observer si ${childName(c)} s’apaise mieux avec des transitions douces et un climat émotionnel sécurisant.`;else if(m.numerology.lifePath)text=`Explorer une activité reliée à la dynamique du chemin de vie ${m.numerology.lifePath}, puis noter si cela ouvre ou ferme l’enfant.`;state.data.nextSteps.push({id:uid('step'),childId:id,classId:c.classId||state.data.settings.activeClassId,pillarId:'presence',text,status:'à proposer',source:'miroirs symboliques',createdAt:today()});save();state.tab='nextsteps';render();toast('Prochaine marche créée depuis les miroirs.')}

function observations(){const kids=activeChildren();const recent=state.data.observations.filter(o=>!activeClass()||o.classId===activeClass().id).slice(-12).reverse();return`${title('Observations','Décrire le fait, formuler une hypothèse, essayer un soutien, noter l’effet et une prochaine marche.')}<div class="micro-help"><p><strong>Une observation juste</strong> décrit un fait et une hypothèse de besoin. Elle ne définit jamais l’enfant.</p><p><strong>Exemple :</strong> “Pendant le cercle, Léo a quitté le groupe après une moquerie. Besoin possible : sécurité / réparation. Soutien essayé : échange en duo. Effet : apaisement partiel. Prochaine marche : proposer une réparation avec objet médiateur.”</p></div><div class="grid two"><div class="card"><h3>Nouvelle observation</h3>${kids.length?`<label>Enfant</label>${childSelect('obsChild',state.selectedChildId||kids[0].id)}`:'<div class="empty">Ajoute d’abord un enfant.</div>'}<label>Pilier</label>${pillarSelect('obsPillar')}<div class="grid two"><div><label>Type</label><select id="obsType"><option>progression</option><option>besoin</option><option>difficulté</option><option>conflit</option><option>réparation</option><option>joie</option></select></div><div><label>Confiance</label><select id="obsConfidence"><option>faible</option><option selected>moyen</option><option>fort</option><option>à vérifier avec l’enfant</option></select></div></div><label>Contexte</label>${quickSelect('contexts','obsContext')}<label>Déclencheur possible</label>${quickSelect('triggers','obsTrigger')}<label>Réaction concrète observée</label><textarea id="obsReaction"></textarea><label>Besoins possibles</label>${listPicker('needs',[], 'obs_needs')}<label>Soutien essayé</label>${quickSelect('supports','obsSupport')}<label>Effet</label><select id="obsEffect"><option>à observer</option><option>a aidé</option><option>neutre</option><option>semble avoir fermé davantage</option><option>à retenter</option></select><label>Trace complémentaire</label><textarea id="obsNote"></textarea><label>Prochaine marche</label><textarea id="obsNext"></textarea><button onclick="App.addObservation()" ${kids.length?'':'disabled'}>Enregistrer</button></div><div class="card"><h3>Récentes</h3>${recent.length?recent.map(o=>observationCard(o)).join(''):'<div class="empty">Aucune observation.</div>'}</div></div>`}
function quickSelect(listKey,id){const opts=list(listKey);return`<input id="${id}" list="dl_${id}"><datalist id="dl_${id}">${opts.map(x=>`<option value="${esc(x)}">`).join('')}</datalist>`}
function observationCard(o){const c=childById(o.childId);return`<div class="card"><div class="split"><div><strong>${esc(childName(c))}</strong> · ${pillar(o.pillarId).icon} ${esc(pillar(o.pillarId).title)}</div><span class="tag">${esc(o.confidence||'')}</span></div><p class="muted tiny">${esc(o.date)} · ${esc(o.type||'')} · ${esc(o.context||'')}</p><p>${esc(o.reaction||o.note||'')}</p>${o.needs?.length?`<p>${tags(o.needs,'warn')}</p>`:''}${o.nextStep?`<div class="callout"><strong>Prochaine marche :</strong> ${esc(o.nextStep)}</div>`:''}</div>`}
function addObservation(){const cl=activeClass();const childId=document.getElementById('obsChild')?.value;if(!childId)return;const next=document.getElementById('obsNext').value.trim();const o={id:uid('obs'),classId:cl?.id||'',childId,date:today(),pillarId:document.getElementById('obsPillar').value,type:document.getElementById('obsType').value,context:document.getElementById('obsContext').value.trim(),trigger:document.getElementById('obsTrigger').value.trim(),reaction:document.getElementById('obsReaction').value.trim(),needs:getPicker('obs_needs'),support:document.getElementById('obsSupport').value.trim(),effect:document.getElementById('obsEffect').value,confidence:document.getElementById('obsConfidence').value,note:document.getElementById('obsNote').value.trim(),nextStep:next};state.data.observations.push(o);if(next)state.data.nextSteps.push({id:uid('step'),classId:o.classId,childId,pillarId:o.pillarId,sourceObservationId:o.id,text:next,status:'à proposer',createdAt:today(),updatedAt:today()});save();render()}
function library(){let acts=state.data.content.activities||[];const f=state.filters.library||{};const q=(f.q||'').toLowerCase();if(q)acts=acts.filter(a=>JSON.stringify(a).toLowerCase().includes(q));if(f.pillar)acts=acts.filter(a=>a.pillarId===f.pillar);if(f.need)acts=acts.filter(a=>(a.needs||[]).includes(f.need));if(f.favorite)acts=acts.filter(a=>a.favorite);return`${title('Bibliothèque','Trouver quoi faire : activités, séquences, situations et ressources importées par packs.')}<div class="micro-help"><p><strong>Situation</strong> = ce que tu rencontres. <strong>Activité</strong> = une ressource à essayer. <strong>Leçon</strong> = une séance préparée pour ton groupe. <strong>Séquence</strong> = plusieurs séances progressives.</p></div><div class="card"><div class="grid four"><input placeholder="Recherche activité…" value="${esc(f.q||'')}" oninput="App.setFilter('library','q',this.value)">${pillarSelect('libPillar',f.pillar||'')}<select onchange="App.setFilter('library','need',this.value)"><option value="">Tous besoins</option>${list('needs').map(n=>`<option ${f.need===n?'selected':''}>${esc(n)}</option>`).join('')}</select><label class="chip ${f.favorite?'selected':''}"><input type="checkbox" ${f.favorite?'checked':''} onchange="App.setFilter('library','favorite',this.checked)"> Favoris</label></div><div class="row" style="margin-top:.6rem"><button class="secondary small" onclick="App.setFilter('library','pillar',document.getElementById('libPillar').value)">Filtrer pilier</button><button class="ghost small" onclick="App.clearLibraryFilters()">Effacer filtres</button></div></div><div class="grid three" style="margin-top:1rem">${acts.length?acts.slice(0,80).map(activityCard).join(''):'<div class="empty">Aucune activité. Importe un pack ou crée tes contenus.</div>'}</div><div class="grid two" style="margin-top:1rem"><div class="card"><h3>Situations fréquentes</h3><p class="muted">Lis une situation, puis transforme-la en activité ou leçon adaptée.</p>${(state.data.content.situations||[]).slice(0,16).map(s=>`<details><summary><strong>${esc(s.title||s.name)}</strong></summary><p>${esc(s.reading||s.description||'')}</p><p>${tags(s.needs,'warn')}</p></details>`).join('')||'<p class="muted">Aucune situation importée.</p>'}</div><div class="card"><h3>Formation rapide</h3>${(state.data.content.teacherTraining||[]).slice(0,8).map(t=>`<div class="callout"><strong>${esc(t.title)}</strong><br>${esc(t.body||t.intention||'')}</div>`).join('')||'<p class="muted">Aucun contenu de formation importé.</p>'}</div></div>`}

function activityCard(a){return`<div class="card activity-card"><div class="split"><h4>${esc(a.title)}</h4><button class="ghost small" onclick="App.toggleFav('${a.id}')">${a.favorite?'★':'☆'}</button></div><p class="muted">${pillar(a.pillarId).icon} ${esc(pillar(a.pillarId).title)} · ${esc(a.duration||'')} min · ${esc(a.format||'')}</p><p>${esc(a.intention||'')}</p><p>${tags(a.needs,'warn')}</p><details><summary>Voir la fiche</summary><ol>${(a.steps||[]).map(s=>`<li>${esc(s)}</li>`).join('')}</ol><p><strong>Phrases :</strong> ${(a.adultPhrases||[]).map(esc).join(' · ')}</p><p><strong>À éviter :</strong> ${(a.avoid||[]).map(esc).join(' · ')}</p><p><strong>Trace :</strong> ${esc(a.trace||'')}</p></details><div class="row"><button class="secondary small" onclick="App.lessonFromActivity('${a.id}')">Créer leçon</button><button class="ghost small" onclick="App.duplicateActivity('${a.id}')">Dupliquer</button></div></div>`}
function setFilter(scope,k,v){state.filters[scope]=state.filters[scope]||{};state.filters[scope][k]=v;render()}function clearLibraryFilters(){state.filters.library={};render()}function toggleFav(id){const a=state.data.content.activities.find(x=>x.id===id);if(a){a.favorite=!a.favorite;save(false);render()}}function duplicateActivity(id){const a=state.data.content.activities.find(x=>x.id===id);if(a){const b={...JSON.parse(JSON.stringify(a)),id:uid('act'),title:a.title+' — copie',favorite:false,_packId:''};state.data.content.activities.push(b);save();render()}}
function lessonFromActivity(id){const a=state.data.content.activities.find(x=>x.id===id);if(!a)return;state.data.lessons.push({id:uid('lesson'),date:today(),title:a.title,pillarId:a.pillarId,activityId:a.id,intention:a.intention,steps:a.steps||[],traceability:{source:'activité bibliothèque',why:'Leçon créée depuis une activité choisie par l’enseignant.',verify:'Observer si l’activité soutient le besoin visé.'},status:'prévue'});state.tab='lessons';save();render()}
function lessons(){const lessons=state.data.lessons.slice().reverse();const obs=state.data.observations.slice(-10).reverse();return`${title('Leçons','Préparer une séance, la relier à une observation, puis noter l’effet.')}<div class="micro-help"><p><strong>Une activité est une ressource.</strong> Une leçon est une séance que tu adaptes à ta classe, avec intention, étapes et retour d’expérience.</p><p><strong>Geste puissant :</strong> transformer une observation en leçon pour passer du suivi à l’action pédagogique.</p></div><div class="grid two"><div class="card"><h3>Créer une leçon rapide</h3><label>Titre</label><input id="lessonTitle"><label>Pilier</label>${pillarSelect('lessonPillar')}<label>Intention</label><textarea id="lessonIntent"></textarea><label>Étapes, une par ligne</label><textarea id="lessonSteps"></textarea><button onclick="App.addLesson()">Créer</button><div class="divider"></div><h3>Transformer une observation en leçon</h3>${obs.length?obs.map(o=>`<div class="card"><p>${esc(childName(childById(o.childId)))} · ${esc(o.reaction||o.note||'')}</p><button class="secondary small" onclick="App.lessonFromObservation('${o.id}')">Transformer en leçon</button></div>`).join(''):'<p class="muted">Aucune observation récente.</p>'}</div><div class="card"><h3>Leçons</h3>${lessons.length?lessons.map(lessonCard).join(''):'<div class="empty">Aucune leçon.</div>'}</div></div>`}
function addLesson(){const steps=document.getElementById('lessonSteps').value.split('\n').map(s=>s.trim()).filter(Boolean);state.data.lessons.push({id:uid('lesson'),date:today(),title:document.getElementById('lessonTitle').value.trim()||'Leçon sans titre',pillarId:document.getElementById('lessonPillar').value,intention:document.getElementById('lessonIntent').value.trim(),steps,traceability:{source:'création manuelle',why:'Choix direct de l’enseignant.',verify:'Observer les signes d’apaisement, d’expression ou de progression.'},status:'prévue'});save();render()}
function lessonFromObservation(id){const o=state.data.observations.find(x=>x.id===id);if(!o)return;const a=(state.data.content.activities||[]).find(x=>x.pillarId===o.pillarId)||{};state.data.lessons.push({id:uid('lesson'),date:today(),title:a.title||('Leçon — '+pillar(o.pillarId).title),pillarId:o.pillarId,activityId:a.id||'',intention:a.intention||('Soutenir '+pillar(o.pillarId).title.toLowerCase()),steps:a.steps||['Ouvrir par une phrase de sécurité.','Vivre une expérience courte.','Faire un retour volontaire.','Noter la prochaine marche.'],traceability:{source:'observation',observationId:o.id,signals:o.reaction||o.note||'',why:`Besoin possible : ${(o.needs||[]).join(', ')||'à préciser'}.`,verify:'Pendant la séance, vérifier si le soutien proposé aide réellement l’enfant ou le groupe.'},status:'prévue'});save();state.tab='lessons';render()}
function lessonCard(l){return`<div class="card"><h4>${esc(l.title)}</h4><p class="muted">${esc(l.date)} · ${pillar(l.pillarId).icon} ${esc(pillar(l.pillarId).title)}</p><p>${esc(l.intention||'')}</p>${l.traceability?`<div class="callout"><strong>Traçabilité :</strong> ${esc(l.traceability.source)}<br>${esc(l.traceability.signals||l.traceability.why||'')}<br><em>${esc(l.traceability.verify||'')}</em></div>`:''}<details><summary>Étapes</summary><ol>${(l.steps||[]).map(s=>`<li>${esc(s)}</li>`).join('')}</ol></details><label>Retour d’expérience</label><textarea id="fb_${l.id}" placeholder="Ce qui a aidé, résisté, prochaine adaptation…"></textarea><button class="secondary small" onclick="App.addFeedback('${l.id}')">Noter l’effet</button></div>`}
function addFeedback(id){const v=document.getElementById('fb_'+id).value.trim();if(!v)return;state.data.lessonFeedback.push({id:uid('fb'),lessonId:id,date:today(),text:v});save();render()}
function openNextSteps(){return state.data.nextSteps.filter(s=>s.status!=='terminée')}
function nextsteps(){const steps=openNextSteps();return`${title('Prochaines marches — petites étapes concrètes','Une marche n’est pas un objectif de performance : c’est la petite étape juste à proposer maintenant.')}<div class="micro-help"><p>Une prochaine marche peut venir d’une observation, d’une leçon ou d’un choix manuel. Elle aide à ne pas perdre les fils d’accompagnement.</p></div><div class="card"><div class="row"><button class="secondary small" onclick="App.addManualStep()">Ajouter une marche manuelle</button></div></div><div class="grid three" style="margin-top:1rem">${steps.length?steps.map(s=>`<div class="card"><h4>${esc(childName(childById(s.childId)))}</h4><p class="muted">${pillar(s.pillarId).icon} ${esc(pillar(s.pillarId).title)} · ${esc(s.status)}</p><p>${esc(s.text)}</p><select onchange="App.updateStep('${s.id}',this.value)"><option ${s.status==='à proposer'?'selected':''}>à proposer</option><option ${s.status==='en cours'?'selected':''}>en cours</option><option ${s.status==='à revoir'?'selected':''}>à revoir</option><option ${s.status==='terminée'?'selected':''}>terminée</option></select></div>`).join(''):'<div class="empty">Aucune prochaine marche ouverte.</div>'}</div>`}
function addManualStep(){const kids=activeChildren();modal(`<h2>Nouvelle marche</h2><label>Enfant</label>${childSelect('manualStepChild',kids[0]?.id||'')}<label>Pilier</label>${pillarSelect('manualStepPillar')}<label>Marche</label><textarea id="manualStepText"></textarea><div class="row" style="justify-content:flex-end"><button class="secondary" onclick="App.closeModal()">Annuler</button><button onclick="App.saveManualStep()">Enregistrer</button></div>`)}
function saveManualStep(){const text=document.getElementById('manualStepText').value.trim();if(!text)return;state.data.nextSteps.push({id:uid('step'),classId:activeClass()?.id||'',childId:document.getElementById('manualStepChild').value,pillarId:document.getElementById('manualStepPillar').value,text,status:'à proposer',createdAt:today(),updatedAt:today()});closeModal();save();render()}function updateStep(id,status){const s=state.data.nextSteps.find(x=>x.id===id);if(s){s.status=status;s.updatedAt=today();save();render()}}
function searchView(){const q=(state.filters.search||'').toLowerCase();const hits=q?globalHits(q):[];return`${title('Recherche globale','Retrouver enfants, observations, activités, leçons, phrases, situations et prochaines marches.')}<div class="card"><input placeholder="Ex : colère, écoute, dire non, conflit, joie, réparation…" value="${esc(state.filters.search||'')}" oninput="App.setSearch(this.value)"></div><div style="margin-top:1rem">${q?hits.map(h=>`<div class="search-hit"><span class="tag">${esc(h.type)}</span><h4>${esc(h.title)}</h4><p>${esc(h.text)}</p></div>`).join('')||'<div class="empty">Aucun résultat.</div>':'<div class="empty">Écris un mot-clé pour chercher dans tout le jardin.</div>'}</div>`}
function setSearch(v){state.filters.search=v;render()}function globalHits(q){const out=[];activeChildren(true).forEach(c=>{const txt=JSON.stringify(c).toLowerCase();if(txt.includes(q))out.push({type:'enfant',title:childName(c),text:[...(c.needs||[]),...(c.interests||[])].join(', ')})});state.data.observations.forEach(o=>{const txt=JSON.stringify(o).toLowerCase();if(txt.includes(q))out.push({type:'observation',title:childName(childById(o.childId))+' — '+pillar(o.pillarId).title,text:o.reaction||o.note||o.nextStep||''})});(state.data.content.activities||[]).forEach(a=>{if(JSON.stringify(a).toLowerCase().includes(q))out.push({type:'activité',title:a.title,text:a.intention||''})});(state.data.content.situations||[]).forEach(s=>{if(JSON.stringify(s).toLowerCase().includes(q))out.push({type:'situation',title:s.title||s.name,text:s.reading||s.description||''})});(state.data.content.pillarReferentials||[]).forEach(r=>{if(JSON.stringify(r).toLowerCase().includes(q))out.push({type:'référentiel',title:r.title||pillar(r.id).title,text:r.essence||r.centralQuestion||''})});(state.data.content.phrases||[]).forEach(p=>{if(JSON.stringify(p).toLowerCase().includes(q))out.push({type:'phrase',title:p.context||p.title||'Phrase',text:p.text||p.body||''})});(state.data.content.teacherTraining||[]).forEach(t=>{if(JSON.stringify(t).toLowerCase().includes(q))out.push({type:'formation',title:t.title||t.name,text:t.body||t.intention||''})});(state.data.content.symbolicGuides||[]).forEach(g=>{if(JSON.stringify(g).toLowerCase().includes(q))out.push({type:'miroir symbolique',title:g.title||g.name,text:(g.observe||[]).join(' · ')||g.description||''})});(state.data.content.avoidPhrases||[]).forEach(a=>{if(JSON.stringify(a).toLowerCase().includes(q))out.push({type:'reformulation',title:a.avoid||a.text||'À éviter',text:a.instead||a.reformulation||a.body||''})});state.data.lessons.forEach(l=>{if(JSON.stringify(l).toLowerCase().includes(q))out.push({type:'leçon',title:l.title,text:l.intention||''})});state.data.nextSteps.forEach(s=>{if(JSON.stringify(s).toLowerCase().includes(q))out.push({type:'marche',title:childName(childById(s.childId)),text:s.text})});return out.slice(0,80)}
function voice(){const kids=activeChildren();const c=childById(state.selectedChildId)||kids[0];if(!c)return`${title('Voix de l’enfant','Aucun enfant actif.')}`;const age=Number(c.age||0);const prompts=age<7?['Mon animal du jour','Ce qui m’aide','Ce que je n’aime pas','Mon petit courage']:age<13?['Ce qui me donne de l’énergie','Ce qui me ferme','Ce que j’aimerais qu’on comprenne','Ma victoire']:['Ce que je veux protéger en moi','Ce qui me semble faux','Ce que je veux apprendre à incarner','Ce que je veux offrir'];return`${title('Voix de l’enfant','Donner une place à ce que l’enfant exprime lui-même.')}<div class="micro-help"><p><strong>À remplir avec l’enfant</strong>, ou à partir de ses mots exacts. Ne remplace pas sa voix par une interprétation adulte.</p></div><div class="grid two"><div class="card"><label>Enfant</label>${childSelect('voiceChild',c.id)}<button class="secondary small" onclick="App.selectChild(document.getElementById('voiceChild').value,'voice')">Choisir</button><h3>${esc(childName(c))}</h3><p>${prompts.map(p=>`<span class="tag">${esc(p)}</span>`).join('')}</p><label>Ce qui m’aide</label><textarea id="voiceHelps">${esc(c.voice?.helps||'')}</textarea><label>Ce qui me fatigue / me ferme</label><textarea id="voiceTires">${esc(c.voice?.tires||'')}</textarea><label>Ce que j’aimerais essayer</label><textarea id="voiceWants">${esc(c.voice?.wants||'')}</textarea><label>Ma petite victoire</label><textarea id="voiceVictory">${esc(c.voice?.victory||'')}</textarea><label>Ce que j’aimerais que l’adulte comprenne</label><textarea id="voiceUnderstand">${esc(c.voice?.understand||'')}</textarea><button onclick="App.saveVoice('${c.id}')">Sauvegarder la voix</button></div><div class="card"><h3>Guidance de formulation</h3><p class="callout">Demander sans forcer. L’enfant peut répondre par un mot, un dessin, un geste, un silence ou un choix d’image.</p><p class="muted">La voix de l’enfant ne remplace pas l’observation adulte ; elle l’équilibre.</p></div></div>`}
function saveVoice(id){const c=childById(id);if(!c)return;c.voice={helps:document.getElementById('voiceHelps').value,tires:document.getElementById('voiceTires').value,wants:document.getElementById('voiceWants').value,victory:document.getElementById('voiceVictory').value,understand:document.getElementById('voiceUnderstand').value};save();render()}
function council(){const roles=list('councilRoles');const councils=state.data.councils.slice().reverse();return`${title('Conseil de Sages','Cercle, rôles, décisions, réparations et rotation douce.')}<div class="micro-help"><p><strong>Le Conseil de Sages</strong> est un cercle de parole structuré pour écouter, décider, réparer et responsabiliser sans humilier.</p></div><div class="grid two"><div class="card"><h3>Nouveau conseil</h3><label>Thème</label><input id="councilTheme"><label>Rôles utilisés</label>${listPicker('councilRoles',roles.slice(0,3),'council_roles')}<label>Décisions / réparations</label><textarea id="councilDecisions"></textarea><label>À vérifier plus tard</label><textarea id="councilFollow"></textarea><button onclick="App.addCouncil()">Enregistrer le conseil</button></div><div class="card"><h3>Rotation proposée</h3><p class="muted">Répartir les rôles sans figer les mêmes enfants dans les mêmes fonctions.</p>${suggestRoleRotation()}</div></div><div class="card" style="margin-top:1rem"><h3>Historique</h3>${councils.length?councils.map(c=>`<div class="card"><h4>${esc(c.theme)}</h4><p class="muted">${esc(c.date)}</p><p>${tags(c.roles)}</p><p>${esc(c.decisions)}</p><p><strong>Suivi :</strong> ${esc(c.followUp||'')}</p></div>`).join(''):'<div class="empty">Aucun conseil enregistré.</div>'}</div>`}
function suggestRoleRotation(){const kids=activeChildren();const roles=list('councilRoles').slice(0,Math.max(3,Math.min(8,kids.length||3)));if(!kids.length||!roles.length)return'<p class="muted">Ajoute des enfants et des rôles dans les listes.</p>';return kids.slice(0,roles.length).map((c,i)=>`<p><span class="tag good">${esc(childName(c))}</span> ${esc(roles[i%roles.length])}</p>`).join('')}
function addCouncil(){state.data.councils.push({id:uid('council'),classId:activeClass()?.id||'',date:today(),theme:document.getElementById('councilTheme').value.trim()||'Conseil',roles:getPicker('council_roles'),decisions:document.getElementById('councilDecisions').value.trim(),followUp:document.getElementById('councilFollow').value.trim()});save();render()}
function reports(){const kids=activeChildren();return`${title('Rapports','Choisir ce qui est partagé : enfant, famille, classe ou anonymisé.')}<div class="micro-help"><p><strong>Rapport enfant</strong> : suivi complet interne. <strong>Rapport famille</strong> : synthèse filtrée par défaut, sans notes libres ni miroirs symboliques. <strong>Rapport classe</strong> : vision collective. <strong>Anonymisé</strong> : pour échanger sans exposer l’identité.</p></div><div class="card"><div class="grid four"><select id="reportType"><option value="class">Classe</option><option value="child">Enfant</option><option value="family">Famille</option><option value="anon">Anonymisé</option></select>${kids.length?childSelect('reportChild',state.selectedChildId||kids[0].id):'<select><option>Aucun enfant</option></select>'}<label class="chip selected"><input type="checkbox" id="repObs" checked onchange="this.parentElement.classList.toggle('selected',this.checked)"> Observations</label><label class="chip selected"><input type="checkbox" id="repSteps" checked onchange="this.parentElement.classList.toggle('selected',this.checked)"> Marches</label></div><button class="secondary" onclick="App.renderReport()">Générer le rapport</button><button class="ghost" onclick="print()">Imprimer</button><div class="divider"></div><p class="tiny muted"><strong>Anonymisé à relire</strong> : remplace les identités, mais demande une relecture humaine. <strong>Moyen</strong> : retire citations et notes sensibles. <strong>Fort</strong> : garde seulement les tendances générales.</p></div><div id="reportOut" style="margin-top:1rem">${reportClass({showObs:true,showSteps:true})}</div>`}
function reportOptions(){return{showObs:checked('repObs'),showSteps:checked('repSteps')}}
function renderReport(){const type=document.getElementById('reportType').value;const opts=reportOptions();document.getElementById('reportOut').innerHTML=type==='child'||type==='family'?reportChild(childById(document.getElementById('reportChild').value),type,opts):type==='anon'?reportAnon():reportClass(opts)}
function reportClass(opts={showObs:true,showSteps:true}){const cl=activeClass();const kids=activeChildren();const obs=state.data.observations.filter(o=>!cl||o.classId===cl.id);return`<div class="card"><h3>Rapport classe</h3><p><strong>Classe :</strong> ${cl?esc(cl.name):'—'}</p><p><strong>Enfants actifs :</strong> ${kids.length}</p>${opts.showObs?`<p><strong>Observations :</strong> ${obs.length}</p><p><strong>Besoins récurrents :</strong> ${tags(top(obs.flatMap(o=>o.needs||[]),8),'warn')}</p>`:'<p class="muted">Observations masquées dans ce rapport.</p>'}${opts.showSteps?`<p><strong>Marches ouvertes :</strong> ${openNextSteps().length}</p>`:'<p class="muted">Prochaines marches masquées dans ce rapport.</p>'}</div>`}
function reportChild(c,type='child',opts={showObs:true,showSteps:true}){if(!c)return'<div class="empty">Aucun enfant.</div>';const obs=state.data.observations.filter(o=>o.childId===c.id);const steps=state.data.nextSteps.filter(s=>s.childId===c.id);if(type==='family'){const recent=opts.showObs?obs.slice(-4).map(o=>`<div class="callout"><strong>${esc(pillar(o.pillarId).title)} :</strong> besoin possible ${esc((o.needs||[]).join(', ')||'à observer')}.<br><span class="muted">Soutien essayé : ${esc(o.support||'à préciser')}. Effet : ${esc(o.effect||'à observer')}.</span></div>`).join(''):'';return`<div class="card"><h3>Synthèse famille — ${esc(childName(c))}</h3><p class="muted">Version partageable : elle garde les faits utiles et retire les notes libres, citations sensibles, voix directe, données de naissance et miroirs symboliques.</p><p>${tags(c.strengths,'good')} ${tags(c.needs,'warn')} ${tags(c.interests)}</p>${opts.showObs?`<p><strong>Observations récentes synthétisées :</strong> ${obs.length}</p>${recent||'<p class="muted">Aucune observation récente.</p>'}`:'<p class="muted">Observations masquées dans ce rapport.</p>'}${opts.showSteps?`<h4>Prochaines marches</h4>${steps.slice(0,5).map(s=>`<p><span class="tag">${esc(s.status)}</span> ${esc(s.text)}</p>`).join('')||'<p class="muted">Aucune.</p>'}`:'<p class="muted">Prochaines marches masquées dans ce rapport.</p>'}</div>`}return`<div class="card"><h3>Rapport enfant — ${esc(childName(c))}</h3><p class="muted">Version interne complète, à relire avant tout partage.</p><p>${tags(c.strengths,'good')} ${tags(c.needs,'warn')} ${tags(c.interests)}</p><p><strong>Ce qui aide :</strong> ${esc(c.voice?.helps||'—')}</p>${opts.showObs?`<p><strong>Observations :</strong> ${obs.length}</p>${obs.slice(-5).map(observationCard).join('')}`:'<p class="muted">Observations masquées dans ce rapport.</p>'}${opts.showSteps?`<h4>Prochaines marches</h4>${steps.map(s=>`<p><span class="tag">${esc(s.status)}</span> ${esc(s.text)}</p>`).join('')||'<p class="muted">Aucune.</p>'}`:'<p class="muted">Prochaines marches masquées dans ce rapport.</p>'}</div>`}
function reportAnon(){const clone=anonymized('moyen');return`<div class="card"><h3>Rapport anonymisé moyen</h3><p>${clone.children.length} enfants anonymisés · ${clone.observations.length} observations simplifiées.</p><p class="muted">Exporter depuis l’onglet Données pour obtenir le JSON.</p></div>`}
function top(arr,n){const m={};arr.filter(Boolean).forEach(x=>m[x]=(m[x]||0)+1);return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,n).map(x=>x[0])}
function listsView(){const keys=Object.keys(state.data.content.lists);return`${title('Listes personnalisables','Aider les saisies avec des listes humaines : besoins, passions, forces, contextes, soutiens…')}<div class="micro-help"><p>Ces listes alimentent les formulaires. Tu peux les compléter selon ton école, ton vocabulaire et tes observations.</p></div><div class="grid two">${keys.map(k=>`<div class="card"><h3>${esc(humanKey(k))}</h3><p class="tiny muted">Clé interne : ${esc(k)}</p><div>${list(k).map(v=>`<span class="tag">${esc(v)} <button class="ghost small" onclick="App.removeListItem('${k}', '${esc(v).replace(/'/g,'&#39;')}')">×</button></span>`).join('')||'<p class="muted">Liste vide.</p>'}</div><div class="inline-form"><input id="list_${k}" placeholder="Ajouter…"><button class="secondary small" onclick="App.addListItem('${k}')">Ajouter</button></div></div>`).join('')}</div>`}
function addListItem(k){const v=document.getElementById('list_'+k).value.trim();if(!v)return;if(!state.data.content.lists[k])state.data.content.lists[k]=[];if(!state.data.content.lists[k].includes(v))state.data.content.lists[k].push(v);save();render()}function removeListItem(k,v){state.data.content.lists[k]=list(k).filter(x=>x!==v);save();render()}
function bytesForLocalData(){try{return new Blob([JSON.stringify(state.data||{})]).size}catch(e){return 0}}
function fmtBytes(n){if(n<1024)return n+' o';if(n<1024*1024)return (n/1024).toFixed(1)+' Ko';return (n/1024/1024).toFixed(2)+' Mo'}
function dataView(){const bytes=bytesForLocalData();const pct=Math.min(100,Math.round(bytes/(5*1024*1024)*100));return`${title('Données','Sauvegarder, restaurer, anonymiser, réinitialiser.')}<div class="micro-help"><p><strong>À retenir :</strong> Sève garde les données dans le stockage du navigateur de cet appareil. Pour ne rien perdre, télécharge régulièrement une sauvegarde complète.</p></div><div class="card soft"><h3>Actions principales</h3><div class="row"><button onclick="App.exportData('full')">Sauvegarder tout</button><label class="secondary small" style="display:inline-flex;align-items:center;gap:.4rem;cursor:pointer">Restaurer <input type="file" accept="application/json,.json" onchange="App.importData(this.files[0])" style="display:none"></label><button class="secondary" onclick="App.exportData('moyen')">Exporter anonymisé</button></div><p class="tiny muted">La restauration remplace les données locales après confirmation. Fais une sauvegarde avant de remplacer.</p></div><div class="grid two" style="margin-top:1rem"><div class="card"><h3>Sauvegarde complète</h3><p class="muted">Contient classes, enfants, observations, contenus importés, packs, paramètres et leçons.</p><div class="storage-meter"><span style="width:${pct}%"></span></div><p class="tiny muted">Taille locale estimée : ${fmtBytes(bytes)} · repère indicatif sur une limite fréquente de 5 Mo.</p></div><div class="card"><h3>Exports partageables</h3><p class="tiny muted"><strong>À relire</strong> : remplace les identités, garde les notes à relire. <strong>Moyen</strong> : retire citations et notes sensibles. <strong>Fort</strong> : garde surtout les tendances.</p><button class="secondary" onclick="App.exportData('leger')">Anonymisé à relire</button> <button class="secondary" onclick="App.exportData('moyen')">Anonymisé moyen</button> <button class="secondary" onclick="App.exportData('fort')">Anonymisé fort</button><div class="divider"></div><button class="secondary" onclick="App.exportCustomPack()">Exporter pack pédagogique personnalisé</button><p class="tiny muted">Un pack pédagogique ne contient pas les données enfants.</p></div></div><div class="card" style="margin-top:1rem"><h3>Confidentialité et stockage</h3><p>Les données sont stockées uniquement dans le navigateur de cet appareil. Ce stockage n’est pas un coffre-fort : protège ton appareil et conserve des sauvegardes complètes.</p><div class="grid four"><div><strong>${state.data.classes.length}</strong><br><span class="muted tiny">classes</span></div><div><strong>${state.data.children.length}</strong><br><span class="muted tiny">enfants</span></div><div><strong>${state.data.observations.length}</strong><br><span class="muted tiny">observations</span></div><div><strong>${state.data.packs.length}</strong><br><span class="muted tiny">packs importés</span></div></div><div class="divider"></div><button class="danger" onclick="App.resetAll()">Réinitialiser l’application vierge</button></div>`}
function anonymized(level){let d=JSON.parse(JSON.stringify(state.data));d.classes=d.classes.map((c,i)=>({...c,name:'Classe '+(i+1),notes:''}));d.children.forEach((c,i)=>{c.firstName='Enfant '+(i+1);c.group='';c.age='';c.voice={};c.keywords=[];c.mirrors={};if(level==='fort'||level==='moyen'){c.strengths=[];c.interests=[]}if(level==='fort'){c.needs=[]}});d.observations.forEach(o=>{if(level==='leger'){o.note=o.note?'[note à relire avant partage]':'';o.reaction=o.reaction?'[fait observé à relire]':'';o.trigger='';}if(level==='moyen'){o.reaction='[retiré]';o.note='[retiré]';o.trigger='';o.context='';}if(level==='fort'){o.reaction='[retiré]';o.note='[retiré]';o.trigger='';o.context='';o.support='';o.nextStep='[synthèse uniquement]';}});if(level==='moyen'||level==='fort'){d.lessons=[];d.lessonFeedback=[];d.councils=[];d.nextSteps=d.nextSteps.map(s=>({...s,text:'[marche synthétisée]',sourceObservationId:''}))}return d}
function exportData(level){const d=level==='full'?state.data:anonymized(level);download(JSON.stringify(d,null,2),level==='full'?'seve_v0_1_alpha_sauvegarde_complete.json':`seve_v0_1_alpha_anonymise_${level}.json`,'application/json')}
function importData(file){if(!file)return;if(!confirm('Restaurer cette sauvegarde complète ? Les données locales actuelles seront remplacées. Pense à les sauvegarder avant de continuer.'))return;const r=new FileReader();r.onload=()=>{try{state.data=migrate(JSON.parse(r.result));state.demoMode=false;save();render();toast('Sauvegarde restaurée.')}catch(e){toast('Import impossible : fichier non reconnu.')}};r.readAsText(file)}
function resetAll(){if(confirm('Réinitialiser toutes les données locales ?')){state.data=defaultData();state.demoMode=false;state.beforeDemo=null;save();render()}}
function download(txt,name,type){const blob=new Blob([txt],{type});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href)}
function startTutorial(){state.tutorialIndex=0;showTutorial()}function showTutorial(){const s=TUTORIAL[state.tutorialIndex];modal(`<h2>${esc(s.title)}</h2><p>${esc(s.body)}</p><p class="muted">Étape ${state.tutorialIndex+1} / ${TUTORIAL.length}</p><div class="row" style="justify-content:space-between"><button class="secondary" ${state.tutorialIndex===0?'disabled':''} onclick="App.prevTutorial()">Précédent</button><div><button class="ghost" onclick="App.closeModal()">Fermer</button> <button onclick="App.nextTutorial()">${state.tutorialIndex===TUTORIAL.length-1?'Terminer':'Suivant'}</button></div></div>`)}function nextTutorial(){if(state.tutorialIndex<TUTORIAL.length-1){state.tutorialIndex++;showTutorial()}else{state.data.settings.tutorialDone=true;save(false);closeModal();toast('Didacticiel terminé.')}}function prevTutorial(){if(state.tutorialIndex>0){state.tutorialIndex--;showTutorial()}}
load();render();
window.App={setTab,toggleTheme,togglePresentation,showEthic,closeModal,startTutorial,nextTutorial,prevTutorial,setMode,finishSetup,addClassFromSetup,enterDemo,exitDemo,keepDemo,previewPack,packSelectAll,importSelectedPack,uninstallPack,exportCustomPack,addChip,getPicker,addClass,addChild,archiveChild,unarchiveChild,selectChild,saveMirrors,updateNumerologyPreview,createStepFromMirror,addObservation,setFilter,clearLibraryFilters,toggleFav,duplicateActivity,lessonFromActivity,addLesson,lessonFromObservation,addFeedback,addManualStep,saveManualStep,updateStep,setSearch,saveVoice,addCouncil,renderReport,addListItem,removeListItem,exportData,importData,resetAll};
})();
</script></body></html>
