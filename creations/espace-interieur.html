<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="application-name" content="Espace Intérieur - Soi-Libre">
<meta name="version" content="v0.1-alpha">
<meta name="description" content="Outil d'introspection et de connaissance de soi - utilisable hors-ligne.">
    
<title>Espace Intérieur - Soi-Libre</title>
<style>

:root{--fd:Georgia,serif;--fb:Optima,Candara,'Segoe UI',sans-serif;
--bg:#F7F4EF;--bgs:#FFF;--bg2:#F0EDE8;--bgn:#FFF;
--p:#6B9E97;--pl:#8FBDB6;--pd:#4D7A73;--sec:#C4A882;--acc:#D4847A;--gold:#C8A96E;
--tx:#2C2C2C;--tx2:#5A5A5A;--txm:#8A8A8A;--bdr:#E0DAD3;
--sh1:0 1px 3px rgba(0,0,0,.06);--sh2:0 4px 12px rgba(0,0,0,.08);--sh3:0 12px 40px rgba(0,0,0,.10);
--r1:4px;--r2:12px;--r3:20px;--tr:.22s ease;--trs:.38s ease;--nw:236px;--hh:56px}
[data-theme=dark]{--bg:#1C1C28;--bgs:#252535;--bg2:#1E1E2E;--bgn:#1A1A28;--p:#7BBFB8;--pl:#95D0C8;--pd:#5A9E96;--tx:#E8E4DC;--tx2:#B0ACA4;--txm:#606070;--bdr:#363648;--sh1:0 1px 3px rgba(0,0,0,.35);--sh2:0 4px 12px rgba(0,0,0,.45);--sh3:0 12px 40px rgba(0,0,0,.55)}
[data-theme=terre]{--bg:#F2EBE0;--bgs:#FAF5EE;--bg2:#EDE4D6;--bgn:#FAF5EE;--p:#8B6F47;--pl:#A8875C;--pd:#6B5234;--sec:#9E8060;--acc:#B8735A;--gold:#A8924E;--tx:#2A1E12;--tx2:#5C4A38;--txm:#9A8878;--bdr:#D4C4B0}
[data-theme=cosmos]{--bg:#0D0D1A;--bgs:#151525;--bg2:#0A0A18;--bgn:#10102A;--p:#7B9EC8;--pl:#95B5D8;--pd:#5A7EA8;--sec:#8A6E9E;--acc:#C87B9E;--gold:#C8A86E;--tx:#D8D4F0;--tx2:#A8A4C0;--txm:#686080;--bdr:#252540;--sh1:0 1px 3px rgba(0,0,0,.6);--sh2:0 4px 12px rgba(0,0,0,.7);--sh3:0 12px 40px rgba(0,0,0,.8)}
[data-theme=foret]{--bg:#EFF4EC;--bgs:#F8FBF6;--bg2:#E4EDE0;--bgn:#F8FBF6;--p:#5C8B5A;--pl:#78A876;--pd:#3D6B3B;--sec:#7A9E6A;--acc:#9E7A5A;--gold:#8A9E5A;--tx:#1A2818;--tx2:#3A5438;--txm:#6A8468;--bdr:#C8DAC4}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--fb);font-size:16px;line-height:1.65;color:var(--tx);background:var(--bg);transition:background var(--trs),color var(--trs);min-height:100vh}
ul{list-style:none}
/* Layout */
#app{display:flex;min-height:100vh}
#sb{width:var(--nw);background:var(--bgn);border-right:1px solid var(--bdr);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform var(--tr),background var(--trs);box-shadow:var(--sh1)}
#slog{padding:20px 18px 12px;border-bottom:1px solid var(--bdr)}
.lgt{font-family:var(--fd);font-size:1.1rem;color:var(--p);letter-spacing:.02em}
.lgsub{font-size:.62rem;color:var(--txm);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
#nav{padding:8px 0;flex:1;overflow-y:auto}
#nav li{margin:2px 8px}
#nav a{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:var(--r1);text-decoration:none;color:var(--tx2);font-size:.84rem;transition:all var(--tr);cursor:pointer}
#nav a:hover{background:var(--bg2);color:var(--tx)}
#nav a.active{background:var(--p);color:#fff}
#nav .ni{font-size:.9rem;width:18px;text-align:center}
#ati{display:none;margin:4px 8px;padding:8px 11px;background:rgba(107,158,151,.1);border:1px solid var(--pl);border-radius:var(--r2);font-size:.75rem;color:var(--pd)}
#ati.show{display:block}
.ati-l{font-weight:600;margin-bottom:2px}.ati-s{color:var(--txm)}
#sfooter{padding:10px 12px;border-top:1px solid var(--bdr);display:flex;gap:4px;flex-wrap:wrap}
#main{margin-left:var(--nw);flex:1;min-height:100vh;display:flex;flex-direction:column}
#topbar{display:none;align-items:center;padding:0 14px;height:var(--hh);background:var(--bgn);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:90;gap:8px}
#pc{padding:28px 32px;max-width:960px;width:100%;margin:0 auto;flex:1}
/* Focus mode */
body.focus #sb,body.focus #topbar{display:none!important}
body.focus #main{margin-left:0}
body.focus #pc{max-width:680px;padding-top:48px}
.fbar{display:none;position:fixed;top:0;left:0;right:0;height:38px;background:var(--p);z-index:200;align-items:center;justify-content:space-between;padding:0 18px}
body.focus .fbar{display:flex}
.fbar span{color:#fff;font-size:.8rem;font-family:var(--fd)}
.fbar button{background:rgba(255,255,255,.2);border:none;color:#fff;padding:3px 10px;border-radius:100px;font-size:.75rem;cursor:pointer}
/* Typography */
h1,h2,h3,h4{font-family:var(--fd);font-weight:normal;line-height:1.3;color:var(--tx)}
h1{font-size:1.8rem;margin-bottom:4px}h2{font-size:1.35rem;margin-bottom:12px}
h3{font-size:1.1rem;margin-bottom:8px}h4{font-size:.95rem;margin-bottom:6px}
p{margin-bottom:.9em}p:last-child{margin-bottom:0}
.ph{margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--bdr)}
.ph h1{color:var(--pd)}.psub{color:var(--tx2);font-size:.9rem;margin-top:3px}
.bc{display:flex;align-items:center;gap:6px;font-size:.75rem;color:var(--txm);margin-bottom:14px}
.bc a{color:var(--txm);cursor:pointer}.bc a:hover{color:var(--p)}.bc .bcs{color:var(--bdr)}
/* Cards */
.card{background:var(--bgs);border:1px solid var(--bdr);border-radius:var(--r2);padding:20px;box-shadow:var(--sh1)}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.cc{cursor:pointer;transition:transform var(--tr),box-shadow var(--tr)}
.cc:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.ci{font-size:1.7rem;margin-bottom:8px;display:block}
.ct{font-family:var(--fd);font-size:1rem;color:var(--pd);margin-bottom:5px}
.cd{font-size:.82rem;color:var(--tx2);line-height:1.5}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:var(--r1);border:none;font-family:var(--fb);font-size:.84rem;cursor:pointer;transition:all var(--tr)}
.bp{background:var(--p);color:#fff}.bp:hover{background:var(--pd)}
.bs{background:var(--bg2);color:var(--tx);border:1px solid var(--bdr)}.bs:hover{background:var(--bdr)}
.ba{background:var(--acc);color:#fff}.ba:hover{opacity:.85}
.bg{background:transparent;color:var(--tx2)}.bg:hover{background:var(--bg2)}
.bsm{padding:4px 10px;font-size:.74rem}.blg{padding:11px 24px;font-size:.95rem}
.bic{padding:7px;border-radius:50%}button:disabled{opacity:.35;cursor:not-allowed}
/* Forms */
.fg{margin-bottom:16px}
label{display:block;font-size:.77rem;font-weight:600;color:var(--tx2);margin-bottom:4px}
input[type=text],input[type=number],input[type=password],textarea,select{width:100%;padding:8px 12px;border:1.5px solid var(--bdr);border-radius:var(--r1);background:var(--bgs);color:var(--tx);font-family:var(--fb);font-size:.85rem;transition:border-color var(--tr);outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(107,158,151,.1)}
textarea{resize:vertical;min-height:80px}
input[type=range]{width:100%;accent-color:var(--p);cursor:pointer}
input[type=checkbox]{accent-color:var(--p);width:16px;height:16px;cursor:pointer;vertical-align:middle}
/* Badges */
.badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:.7rem;font-weight:600}
.bprim{background:var(--p);color:#fff}.bsoft{background:var(--bg2);color:var(--tx2);border:1px solid var(--bdr)}
.bgold{background:rgba(200,169,110,.18);color:var(--gold)}.bgrn{background:rgba(107,174,130,.15);color:#4a8a60}
/* Progress */
.pb{height:6px;background:var(--bg2);border-radius:100px;overflow:hidden;margin:5px 0}
.pf{height:100%;background:var(--p);border-radius:100px;transition:width .5s ease}
/* Tabs */
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--bdr);margin-bottom:22px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 14px;border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;color:var(--tx2);font-size:.84rem;white-space:nowrap;transition:all var(--tr)}
.tab:hover{color:var(--tx)}.tab.active{color:var(--p);border-bottom-color:var(--p);font-weight:600}
/* Callout */
.cl{padding:12px 16px;border-radius:var(--r2);border-left:4px solid;margin:14px 0;font-size:.85rem}
.cl p{margin-bottom:0}
.cli{background:rgba(107,158,151,.07);border-color:var(--p)}
.clw{background:rgba(196,168,130,.09);border-color:var(--sec)}
.cla{background:rgba(212,132,122,.07);border-color:var(--acc)}
.clg{background:rgba(200,169,110,.08);border-color:var(--gold)}
.clpur{background:rgba(140,100,160,.07);border-color:#8a60a0}
/* Stats */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-bottom:22px}
.sc{background:var(--bgs);border:1px solid var(--bdr);border-radius:var(--r2);padding:16px 10px;text-align:center;box-shadow:var(--sh1)}
.sv{font-family:var(--fd);font-size:1.8rem;color:var(--p);line-height:1;margin-bottom:3px}
.sl{font-size:.68rem;color:var(--txm);text-transform:uppercase;letter-spacing:.05em}
/* Chart */
.chart-wrap{background:var(--bgs);border:1px solid var(--bdr);border-radius:var(--r2);padding:16px}
.chart-wrap svg{width:100%;overflow:visible}
/* Quiz */
.qq{background:var(--bgs);border:1px solid var(--bdr);border-radius:var(--r2);padding:18px;margin-bottom:12px}
.qqn{font-size:.7rem;color:var(--txm);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.qqt{font-size:.9rem;margin-bottom:12px;line-height:1.7}
.so{display:flex;gap:5px;flex-wrap:wrap}
.sopt{flex:1;min-width:50px;padding:8px 4px;border:1.5px solid var(--bdr);border-radius:var(--r1);text-align:center;cursor:pointer;transition:all var(--tr);font-size:.78rem;color:var(--tx2);background:var(--bgs)}
.sopt:hover{border-color:var(--p);color:var(--p)}.sopt.sel{background:var(--p);border-color:var(--p);color:#fff}
.slbls{display:flex;justify-content:space-between;font-size:.68rem;color:var(--txm);margin-top:4px}
.rc{width:100px;height:100px;border-radius:50%;border:4px solid var(--p);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 16px}
.rsn{font-family:var(--fd);font-size:1.8rem;color:var(--p);line-height:1}
.rsx{font-size:.68rem;color:var(--txm)}
.rband{background:var(--bg2);border-radius:var(--r2);padding:16px;margin:14px 0;text-align:center}
/* Breathing */
.bwrap{display:flex;flex-direction:column;align-items:center;padding:24px 20px}
.bring{width:148px;height:148px;border-radius:50%;background:radial-gradient(circle,var(--pl),var(--p));display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--fd);font-size:.88rem;text-align:center;cursor:pointer;user-select:none;transition:transform .4s ease}
.bring.inh{animation:bin 5s ease-in-out forwards}
.bring.hld{transform:scale(1.42)}
.bring.exh{animation:bout 5s ease-in-out forwards}
@keyframes bin{from{transform:scale(1)}to{transform:scale(1.42)}}
@keyframes bout{from{transform:scale(1.42)}to{transform:scale(1)}}
.bphase{font-family:var(--fd);font-size:1.2rem;color:var(--p);margin-top:18px;min-height:1.7rem;text-align:center}
.btimer{font-size:1.7rem;color:var(--tx2);font-family:var(--fd);min-width:32px;text-align:center}
/* Wheel */
.wwrap{display:flex;flex-direction:column;align-items:center;gap:14px}
#ewhl{cursor:pointer;max-width:320px;width:100%}
.winfo{background:var(--bg2);border-radius:var(--r2);padding:12px 16px;width:100%;border:1px solid var(--bdr);text-align:center;min-height:52px}
.wfreq-wrap{width:100%;background:var(--bg2);border-radius:var(--r2);padding:14px;border:1px solid var(--bdr)}
.wfreq-cloud{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.wfreq-item{border-radius:100px;padding:3px 10px;font-size:.76rem;font-weight:600}
/* EFT */
.efts{display:flex;gap:12px;align-items:flex-start;padding:12px;border-radius:var(--r2);border:1.5px solid var(--bdr);margin-bottom:8px;cursor:pointer;transition:all var(--tr)}
.efts:hover,.efts.on{border-color:var(--p);background:rgba(107,158,151,.04)}
.efts.done{border-color:var(--sec);background:rgba(196,168,130,.05)}
.eftn{width:28px;height:28px;border-radius:50%;background:var(--p);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0}
.efts.done .eftn{background:var(--sec)}
/* Grounding */
.gs{display:flex;gap:12px;align-items:flex-start;padding:16px;border-radius:var(--r2);border:1.5px solid var(--bdr);margin-bottom:12px;transition:all var(--tr)}
.gs.cur{border-color:var(--p);background:rgba(107,158,151,.04);box-shadow:var(--sh1)}
.gs.don{border-color:var(--sec);opacity:.65}
.gn{font-family:var(--fd);font-size:2rem;color:var(--p);line-height:1;min-width:36px}
.gsns{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--txm);margin-bottom:2px}
.ginp{display:none;margin-top:8px}.gs.cur .ginp{display:block}
/* Body scan */
.bzone{fill:rgba(107,158,151,.12);stroke:var(--p);stroke-width:1.5;transition:fill .2s;cursor:pointer}
.bzone:hover,.bzone.bsel{fill:rgba(107,158,151,.4)}
/* Meditation */
.med-step{padding:18px;background:var(--bg2);border-radius:var(--r2);border:1.5px solid var(--bdr);margin-bottom:10px;transition:all var(--tr)}
.med-step.cur{border-color:var(--p);background:rgba(107,158,151,.05)}
.med-step.don{opacity:.55}
.med-step p{font-size:.9rem;font-style:italic;color:var(--tx2);line-height:1.85;margin-bottom:6px}
/* Shadow work */
.sw-step{padding:20px;background:var(--bg2);border-radius:var(--r2);border:1.5px solid var(--bdr);margin-bottom:14px;transition:all var(--tr)}
.sw-step.active{border-color:var(--p);background:rgba(107,158,151,.04)}
.sw-step.sdone{border-color:var(--sec);opacity:.7}
.sw-q{font-family:var(--fd);font-size:1rem;color:var(--pd);margin-bottom:8px}
.sw-hint{font-size:.82rem;color:var(--txm);font-style:italic;margin-bottom:10px}
/* Mind map */
#mmcanvas{width:100%;height:420px;background:var(--bg2);border-radius:var(--r2);border:1px solid var(--bdr);position:relative;overflow:hidden;touch-action:none;user-select:none}
.mmnode{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;text-align:center;cursor:grab;font-family:var(--fd);font-size:.78rem;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.2);transition:box-shadow .2s;padding:6px}
.mmnode:active{cursor:grabbing}
.mmnode.msel{box-shadow:0 0 0 3px #fff,0 4px 16px rgba(0,0,0,.3)}
#mmsvg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
/* Gratitude */
.grat-entry{background:var(--bgs);border:1px solid var(--bdr);border-radius:var(--r2);padding:14px;margin-bottom:8px}
.grat-meta{font-size:.74rem;color:var(--txm);margin-bottom:6px}
.grat-lbl{font-size:.7rem;color:var(--p);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
/* Journal */
.jfilters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;padding:12px;background:var(--bg2);border-radius:var(--r2);border:1px solid var(--bdr)}
.je{background:var(--bgs);border:1px solid var(--bdr);border-radius:var(--r2);padding:16px;margin-bottom:8px}
.jmeta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:8px;font-size:.75rem;color:var(--txm)}
.jtxt{font-size:.87rem;color:var(--tx2);line-height:1.75}
.jbody{font-size:.78rem;color:var(--txm);margin-top:6px;font-style:italic}
.jsugg{margin-top:8px;padding-top:8px;border-top:1px dashed var(--bdr);font-size:.78rem;color:var(--txm)}
.jsugg a{color:var(--p);cursor:pointer;font-weight:600}
.jstats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:18px}
.jstat{background:var(--bgs);border:1px solid var(--bdr);border-radius:var(--r2);padding:14px;box-shadow:var(--sh1)}
.jstat-val{font-family:var(--fd);font-size:1.4rem;color:var(--p);margin-bottom:3px}
.jstat-lbl{font-size:.72rem;color:var(--txm);text-transform:uppercase;letter-spacing:.04em}
.etag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:100px;font-size:.72rem;font-weight:600}
.ei{background:rgba(107,158,151,.14);color:var(--pd)}.ee{background:rgba(212,132,122,.14);color:var(--acc)}.em{background:rgba(196,168,130,.14);color:var(--gold)}.en{background:var(--bg2);color:var(--txm);border:1px solid var(--bdr)}
.pchip{padding:5px 12px;border-radius:100px;border:1.5px dashed var(--bdr);background:transparent;color:var(--tx2);font-size:.78rem;cursor:pointer;font-family:var(--fb);transition:all var(--tr)}
.pchip:hover{border-color:var(--p);color:var(--p)}
.sug{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;background:rgba(107,158,151,.1);border:1px solid var(--pl);color:var(--pd);font-size:.75rem;cursor:pointer;transition:all var(--tr);margin:3px}
.sug:hover{background:var(--p);color:#fff}
/* Check-in */
.ci-wrap{max-width:520px;margin:0 auto}
.ci-hist{display:flex;align-items:flex-end;gap:4px;height:50px;margin:14px 0}
.ci-bar{flex:1;border-radius:2px 2px 0 0;min-height:3px;cursor:pointer}
/* KB */
.kb-art h3{color:var(--pd);margin-top:20px;margin-bottom:8px;font-size:1.05rem}
.kb-art h3:first-child{margin-top:0}
.kb-art p{color:var(--tx2);line-height:1.85;font-size:.9rem}
.kb-art blockquote{border-left:3px solid var(--sec);padding:10px 16px;margin:14px 0;background:var(--bg2);border-radius:0 var(--r1) var(--r1) 0;font-style:italic;color:var(--tx2);font-size:.88rem}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}
.dc{background:var(--bg2);border-radius:var(--r2);padding:12px;border-top:3px solid}
.dcl{border-color:var(--p)}.dcr{border-color:var(--sec)}
.dc p{font-size:.82rem;margin-bottom:.5em;color:var(--tx2)}
.kbtag{font-size:.72rem;padding:2px 9px;border-radius:100px;background:var(--bg2);border:1px solid var(--bdr);color:var(--txm);margin-right:4px}
.bmk{background:none;border:none;cursor:pointer;font-size:1rem;padding:3px;transition:transform .2s}
.bmk:hover{transform:scale(1.2)}
/* Tool history */
.th-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr);font-size:.84rem}
.th-row:last-child{border-bottom:none}
/* Settings */
.ss{background:var(--bgs);border:1px solid var(--bdr);border-radius:var(--r2);padding:20px;margin-bottom:14px}
.ss h3{font-size:.95rem;color:var(--pd);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--bdr)}
.theme-grid{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.tswatch{width:44px;height:44px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all var(--tr);position:relative}
.tswatch.act{border-color:var(--tx)}
.tswatch::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.9rem;opacity:0}
.tswatch.act::after{opacity:1}
/* Programs */
.prog-card{background:var(--bgs);border:1px solid var(--bdr);border-radius:var(--r2);padding:20px;margin-bottom:14px}
.prog-day{display:flex;gap:12px;align-items:flex-start;padding:12px;border-radius:var(--r2);border:1.5px solid var(--bdr);margin-bottom:8px;transition:all var(--tr)}
.prog-day.done{border-color:var(--sec);background:rgba(196,168,130,.05)}
.prog-day.today{border-color:var(--p);background:rgba(107,158,151,.05);box-shadow:var(--sh1)}

<script>

/* ================================================================
   ESPACE INTÉRIEUR v5 — MVC · Single-file · Offline
   Chiffrement AES-GCM · 5 thèmes · Notifications · Export MD+JSON
   12 outils · 4 évaluations · Intelligence contextuelle · Focus mode
================================================================ */

// ── CRYPTO ──────────────────────────────────────────────────────
const Crypt={
  async enc(data,pwd){
    const e=new TextEncoder(),km=await crypto.subtle.importKey('raw',e.encode(pwd),'PBKDF2',false,['deriveKey']);
    const salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12));
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt']);
    const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,e.encode(data));
    return JSON.stringify({s:[...salt],i:[...iv],d:[...new Uint8Array(ct)]});
  },
  async dec(str,pwd){
    const {s,i,d}=JSON.parse(str),e=new TextEncoder();
    const km=await crypto.subtle.importKey('raw',e.encode(pwd),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:new Uint8Array(s),iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(i)},key,new Uint8Array(d));
    return new TextDecoder().decode(pt);
  }
};

// ── I18N ─────────────────────────────────────────────────────────
const I18n={
  lang:'fr',
  data:{fr:{
    tips:['Le vide n\'est pas un manque à combler. C\'est un espace à explorer.','Distinguer ce qui vient de vous et ce qui vient des autres est un acte de libération.','Les émotions sont des visiteurs. Les sentiments sont des résidences temporaires.','Votre sensibilité n\'est pas votre faiblesse — c\'est votre boussole.','Ce que vous ressentez n\'a pas besoin d\'être justifié pour être réel.','L\'auto-guérison commence par un regard honnête, non par un jugement.','Ce que vous portez appartient parfois aux autres. Vous avez le droit de le rendre.','La guérison n\'est pas linéaire. Chaque retour en arrière est une information.','Le corps sait avant le mental. Apprenez à l\'écouter.','Aujourd\'hui, poser une main sur son cœur est déjà un acte d\'amour envers soi.']
  }},
  t(k){return (this.data[this.lang]||this.data.fr)[k]||(this.data.fr)[k]||k;},
  tip(){const a=this.t('tips');return Array.isArray(a)?a[Math.floor(Math.random()*a.length)]:'';},
  empty(){return 'Aucune entrée pour l\'instant.'},
  confirmDel(){return 'Supprimer cette entrée ?'}
};

// ── MODEL ────────────────────────────────────────────────────────
const Model={
  KEY:'ei_v5',SK:'ei_s',_pwd:null,
  def(){return{meta:{version:'5.0',theme:'light',created:new Date().toISOString()},stats:{sessions:0,toolsUsed:0},onboarding:{done:false,answers:{}},journal:[],assessments:{},toolSessions:[],toolHistory:[],bookmarks:[],programProgress:{},intention:'',gratitude:[],checkins:[],wheelHistory:[],reminders:{enabled:false,times:['08:00','13:00','19:00'],lastCheck:null},encryption:{enabled:false,hint:''},mindmapNodes:[],mindmapLinks:[],timelineEvents:[],journalDraft:{},journalTags:{},weeklyChallenge:null};},
  data:null,
  migrate(d){
    const def=this.def();for(const k in def)if(d[k]===undefined)d[k]=def[k];
    d.meta.version='5.0';return d;
  },
  load(){
    try{
      const raw=localStorage.getItem(this.KEY);
      if(!raw){this.data=this.def();return;}
      let p;try{p=JSON.parse(raw);}catch(e){this.data=this.def();return;}
      if(p._encrypted){this.data=this.def();this.data._needsDecrypt=true;this.data._enc=raw;return;}
      this.data=this.migrate(p);
    }catch(e){this.data=this.def();}
  },
  async loadEnc(pwd){
    try{const raw=localStorage.getItem(this.KEY),w=JSON.parse(raw),dec=await Crypt.dec(w._data,pwd);this.data=this.migrate(JSON.parse(dec));this._pwd=pwd;return true;}catch(e){return false;}
  },
  async save(){
    try{
      if(this.data.encryption?.enabled&&this._pwd){
        const enc=await Crypt.enc(JSON.stringify(this.data),this._pwd);
        localStorage.setItem(this.KEY,JSON.stringify({_encrypted:true,_data:enc}));
      }else{localStorage.setItem(this.KEY,JSON.stringify(this.data));}
    }catch(e){}
  },
  ss(s){try{sessionStorage.setItem(this.SK,JSON.stringify(s));}catch(e){}},
  ls(){try{return JSON.parse(sessionStorage.getItem(this.SK)||'null');}catch(e){return null;}},
  cs(){try{sessionStorage.removeItem(this.SK);}catch(e){}},
  exportJSON(){const b=new Blob([JSON.stringify(this.data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`ei-${new Date().toISOString().slice(0,10)}.json`;a.click();},
  exportMD(){
    const d=this.data;let md='# Espace Intérieur — Export\n_'+new Date().toLocaleDateString('fr-FR')+'_\n\n---\n\n';
    md+='## Journal ('+d.journal.length+' entrées)\n\n';
    [...d.journal].reverse().forEach(e=>{
      const dt=new Date(e.date).toLocaleDateString('fr-FR'),hr=new Date(e.date).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
      const ol={internal:'Interne',external:'Absorbé',mixed:'Mixte'},tl={emotion:'Émotion',sentiment:'Sentiment',both:'Les deux'};
      md+='### '+dt+' '+hr+'\n';
      if(e.emotion)md+='**'+e.emotion+'**';if(e.type)md+=' · _'+( tl[e.type]||'')+'_';if(e.origin)md+=' · '+(ol[e.origin]||'');if(e.intensity)md+=' · i'+e.intensity+'/4';md+='\n\n';
      if(e.text)md+=e.text+'\n\n';if(e.bodyNote)md+='_Corps : '+e.bodyNote+'_\n\n';md+='---\n\n';
    });
    if(d.gratitude?.length){md+='## Gratitude ('+d.gratitude.length+')\n\n';[...d.gratitude].reverse().slice(0,20).forEach(g=>{md+='**'+new Date(g.date).toLocaleDateString('fr-FR')+'**\n';if(g.vivance)md+='- 🌱 '+g.vivance+'\n';if(g.sensation)md+='- 🫀 '+g.sensation+'\n';if(g.chose)md+='- 🔍 '+g.chose+'\n';md+='\n';});}
    md+='## Évaluations\n\n';for(const[id,res]of Object.entries(d.assessments||{})){const a=Assessments.getById(id);if(!a||!res.length)continue;md+='### '+a.title+'\n';res.forEach(r=>{md+='- '+new Date(r.date).toLocaleDateString('fr-FR')+' : **'+r.score+(a.max?'/'+a.max:'')+'** — '+(r.bandTitle||'')+'\n';});md+='\n';}
    md+='## Stats\n- Sessions : '+d.stats.sessions+'\n- Outils : '+d.stats.toolsUsed+'\n- Journal : '+d.journal.length+'\n';
    const b=new Blob([md],{type:'text/markdown'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`ei-${new Date().toISOString().slice(0,10)}.md`;a.click();
  },
  importJSON(str){try{this.data=this.migrate({...this.def(),...JSON.parse(str)});this.save();return true;}catch(e){return false;}},
  addJ(e){this.data.journal.unshift({id:Date.now(),date:new Date().toISOString(),...e});this.save();},
  delJ(id){this.data.journal=this.data.journal.filter(e=>e.id!==id);this.save();},
  saveA(id,r){if(!this.data.assessments[id])this.data.assessments[id]=[];this.data.assessments[id].unshift({date:new Date().toISOString(),...r});this.save();},
  logT(t){this.data.toolSessions.push({tool:t,date:new Date().toISOString()});this.data.stats.toolsUsed=(this.data.stats.toolsUsed||0)+1;const th=this.data.toolHistory||[];const ex=th.find(x=>x.tool===t);if(ex){ex.count=(ex.count||0)+1;ex.lastDate=new Date().toISOString();}else th.push({tool:t,count:1,lastDate:new Date().toISOString()});this.data.toolHistory=th;this.save();},
  logW(em){this.data.wheelHistory=this.data.wheelHistory||[];this.data.wheelHistory.unshift({emotion:em,date:new Date().toISOString()});if(this.data.wheelHistory.length>200)this.data.wheelHistory.pop();this.save();},
  addG(g){this.data.gratitude=this.data.gratitude||[];this.data.gratitude.unshift({id:Date.now(),date:new Date().toISOString(),...g});this.save();},
  addCI(c){this.data.checkins=this.data.checkins||[];this.data.checkins.unshift({id:Date.now(),date:new Date().toISOString(),...c});this.save();},
  incS(){this.data.stats.sessions=(this.data.stats.sessions||0)+1;this.save();},
  toggleBM(id){const b=this.data.bookmarks||[];const i=b.indexOf(id);if(i>-1)b.splice(i,1);else b.push(id);this.data.bookmarks=b;this.save();},
  isBM(id){return(this.data.bookmarks||[]).includes(id);},
  setInt(t){this.data.intention=t;this.save();},
  saveProgDay(pid,day){this.data.programProgress=this.data.programProgress||{};if(!this.data.programProgress[pid])this.data.programProgress[pid]=[];if(!this.data.programProgress[pid].includes(day))this.data.programProgress[pid].push(day);this.save();}
};

// ── NOTIFICATIONS ────────────────────────────────────────────────
const Notifs={
  async req(){if(!('Notification'in window))return false;if(Notification.permission==='granted')return true;return(await Notification.requestPermission())==='granted';},
  send(t,b){if(Notification.permission!=='granted')return;new Notification(t,{body:b});},
  check(){
    const r=Model.data.reminders;if(!r?.enabled)return;
    const now=new Date(),hm=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const today=now.toDateString();if(r.lastCheck===today)return;
    const toMin=t=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
    const nowMin=toMin(hm);
    if(r.times.some(t=>Math.abs(nowMin-toMin(t))<6)){this.send('Espace Intérieur','C\'est le moment de votre pratique 🌿');Model.data.reminders.lastCheck=today;Model.save();}
  }
};

// ── INTELLIGENCE CONTEXTUELLE ────────────────────────────────────
const Intel={
  vL(){const r=(Model.data.assessments['void-22']||[])[0];return r?r.score/88:null;},
  eL(){const r=(Model.data.assessments['empath-profile']||[])[0];return r?r.score/48:null;},
  dL(){const r=(Model.data.assessments['dissociation']||[])[0];return r?r.score/40:null;},
  recentEm(){return(Model.data.journal||[]).slice(0,8).map(e=>(e.emotion||'').toLowerCase()).filter(Boolean);},
  sugTool(){
    const vl=this.vL(),el=this.eL(),dl=this.dL(),em=this.recentEm();
    if(dl>0.5)return{id:'grounding',reason:'La dissociation détectée appelle un ancrage corporel en priorité.'};
    if(el>0.6)return{id:'empathy',reason:'Votre profil empathique élevé suggère de vérifier l\'origine de vos ressentis.'};
    if(em.some(e=>e.includes('peur')||e.includes('anxi')))return{id:'breathing',reason:'Des résonances d\'anxiété dans votre journal — la respiration peut aider.'};
    if(em.some(e=>e.includes('col')||e.includes('frust')))return{id:'eft',reason:'L\'EFT est efficace pour libérer la colère et la frustration.'};
    if(vl>0.5)return{id:'breathing',reason:'La régulation nerveuse est une base essentielle pour votre profil.'};
    return{id:'wheel',reason:'Explorer et nommer vos états est un bon point de départ aujourd\'hui.'};
  },
  sugArt(){const vl=this.vL(),el=this.eL();if(el>0.55)return'empath-void';if(vl>0.6)return'spiritual-void';return'emotions-feelings';},
  cross(){
    const a=Model.data.assessments||{};const lines=[];
    const v=a['void-22']?.[0],em=a['empath-profile']?.[0],di=a['dissociation']?.[0],at=a['attachment']?.[0];
    if(v&&em){const vl=v.score/88,el=em.score/48;if(vl>0.4&&el>0.5)lines.push({i:'🕳️🌊',t:'Vide + hyper-empathie : votre vide est probablement lié à la mise sous silence de vos ressentis pour vous protéger du trop-plein extérieur.'});else if(vl>0.4)lines.push({i:'🕳️',t:'Votre vide semble davantage lié à l\'histoire personnelle (trauma, carence) qu\'à l\'absorption externe.'});}
    if(di?.score/40>0.45)lines.push({i:'🌫️',t:'Dissociation significative : le travail somatique (grounding, cohérence cardiaque) devrait être prioritaire.'});
    if(at?.bandTitle){const b=at.bandTitle.toLowerCase();if(b.includes('évitant'))lines.push({i:'🔗',t:'Attachement évitant : la distance émotionnelle alimente le vide de connexion. L\'IFS peut aider à rencontrer la partie protectrice.'});if(b.includes('anxieux'))lines.push({i:'🔗',t:'Attachement anxieux : la dépendance à la validation externe crée un vide structurel. Développer la sécurité intérieure est central.'});}
    const sh=a['shame-profile']?.[0],snv=a['nervous-system']?.[0];
    if(sh){const sl=sh.score/48;if(sl>0.5)lines.push({i:'🌑',t:"La honte est significativement présente : elle est souvent la racine profonde du vide. L'outil IFS (L'Exilé) et la méditation Honte-Compassion sont particulièrement indiqués."});}
    if(snv){const nl=snv.score/48;if(nl<0.35)lines.push({i:'⚡',t:'Votre système nerveux semble en tension chronique. Les pratiques somatiques (cohérence cardiaque, grounding) sont prioritaires avant toute exploration émotionnelle intense.'});}
    return lines.length?lines:null;
  },
  jStats(){
    const j=Model.data.journal||[];if(j.length<5)return null;
    const or={internal:0,external:0,mixed:0},em={},it=[];
    j.forEach(e=>{if(e.origin)or[e.origin]=(or[e.origin]||0)+1;if(e.emotion)em[e.emotion]=(em[e.emotion]||0)+1;if(e.intensity)it.push(e.intensity);});
    const top=Object.entries(em).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([k,v])=>({k,v}));
    const avg=it.length?Math.round(it.reduce((a,b)=>a+b,0)/it.length*10)/10:0;
    const tot=or.internal+or.external+or.mixed||1;
    return{or,top,avg,total:j.length,totOr:tot};
  },
  weeklyChallenge(){
    // Défi adapté au profil, change chaque semaine
    const challenges=[
      "Avant chaque repas aujourd'hui, posez une main sur votre ventre et demandez-lui ce qu'il ressent.",
      "Cette semaine, nommez une émotion à voix haute — même seul(e) — chaque fois que vous en ressentez une.",
      "Choisissez un moment de la journée pour 5 minutes de cohérence cardiaque, chaque jour.",
      "Notez chaque soir une chose minuscule qui vous a fait vous sentir vivant(e) aujourd'hui.",
      "Lorsque vous ressentez quelque chose, posez-vous : \"Est-ce que cela m'appartient vraiment ?\"",
      "Cette semaine, prenez 2 minutes le matin pour scanner votre corps de la tête aux pieds.",
      "Chaque fois que vous vous critiquez, remplacez la phrase par ce que vous diriez à un ami.",
    ];
    const weekNum=Math.floor(Date.now()/(7*24*3600*1000));
    return challenges[weekNum%challenges.length];
  },
  toolForEm(em,orig){
    if(!em)return null;const e=(em||'').toLowerCase();
    if(orig==='external')return{id:'empathy',label:'Filtre Empathique'};
    if(e.includes('col')||e.includes('frust'))return{id:'eft',label:'EFT Tapping'};
    if(e.includes('peur')||e.includes('anxi'))return{id:'grounding',label:'Ancrage 5-4-3-2-1'};
    if(e.includes('trist')||e.includes('vide'))return{id:'meditation',label:'Méditation guidée'};
    if(e.includes('honte')||e.includes('culpa'))return{id:'ifs',label:'Parties Intérieures'};
    return null;
  },
  weeklyInsights(){
    const j=Model.data.journal||[],now=new Date(),wk=7*24*3600*1000;
    const thisW=j.filter(e=>now-new Date(e.date)<wk);
    const prevW=j.filter(e=>{const d=now-new Date(e.date);return d>=wk&&d<2*wk;});
    const days=Array.from({length:7},(_,i)=>{const d=new Date(now);d.setDate(d.getDate()-6+i);const ds=d.toDateString();const ej=thisW.filter(e=>new Date(e.date).toDateString()===ds);return{day:d.toLocaleDateString('fr-FR',{weekday:'short'}),count:ej.length};});
    return{days,thisW:thisW.length,prevW:prevW.length,intW:thisW.filter(e=>e.origin==='internal').length,extW:thisW.filter(e=>e.origin==='external').length};
  }

const KB={arts:[
  {id:'void-intro',icon:'🕳️',tags:['fondamental'],rt:6,title:'Qu\'est-ce que le vide émotionnel ?',desc:'Comprendre la nature, les causes et les visages du vide intérieur.',
   html:`<h3>Définition</h3><p>Le vide émotionnel est une expérience de manque ou d'engourdissement affectif — une béance intérieure, un "rien" là où il devrait y avoir quelque chose.</p><blockquote>« Le vide que tu ressens n'est pas une absence de toi. C'est l'appel de ce que tu n'as pas encore osé être. »</blockquote><h3>Ce que le vide cache</h3><p>Derrière le vide : émotions refoulées intenses (colère, honte, peur) ; besoin profond non reconnu ; partie de soi niée ; seuil d'une vie plus authentique.</p><h3>Causes psychologiques</h3><p><strong>Carences affectives :</strong> l'enfant éteint ses émotions pour survivre — ce mécanisme devient une prison invisible. <strong>Trauma :</strong> réponse dissociative adaptative. <strong>Attachement insécure :</strong> difficulté structurelle à ressentir l'amour. <strong>Suppression chronique :</strong> à force de ne pas ressentir, on finit par ne plus pouvoir.</p><h3>Causes existentielles</h3><p><strong>Perte de sens :</strong> frustration existentielle (Frankl). <strong>Héritage transgénérationnel :</strong> certains vides sont hérités sur plusieurs générations.</p>`},
  {id:'empath-void',icon:'🌊',tags:['empathie','clé'],rt:5,title:'L\'empathique et le vide',desc:'Pourquoi les êtres ultra-empathiques étouffent leurs ressentis.',
   html:`<h3>L'être ultra-empathique</h3><p>Son vide n'est pas un manque d'émotions — c'est la mise sous silence de sa vie intérieure pour se protéger du trop-plein extérieur. Son chemin : <strong>apprendre à discriminer</strong>.</p><div class="dg"><div class="dc dcl"><h4>🌿 Ressentir (interne)</h4><p>Émerge de votre intérieur. Cohérence narrative. S'apaise quand le besoin est reconnu. Reste avec le repos seul.</p></div><div class="dc dcr"><h4>🌊 Absorber (externe)</h4><p>Surgit "de nulle part" en présence d'autrui. Pas de cohérence interne. S'atténue quand vous vous isolez.</p></div></div><h3>La question clé</h3><p><strong>"Ce ressenti m'appartient-il vraiment ?"</strong> Était-il présent avant l'interaction ? Ressemble-t-il à l'état de la personne en face ? Disparaît-il quand vous vous isolez ?</p>`},
  {id:'emotions-feelings',icon:'💎',tags:['fondamental','clé'],rt:5,title:'Émotions vs Sentiments',desc:'Une distinction essentielle qui change tout à la connaissance de soi.',
   html:`<div class="dg"><div class="dc dcl"><h4>⚡ ÉMOTION (primaire)</h4><p>Automatique, corporelle, universelle. Cerveau limbique. Secondes à minutes. Les 6 d'Ekman : joie, tristesse, peur, colère, dégoût, surprise.</p><p><em>"Mon cœur s'emballe. Ma gorge se serre."</em></p></div><div class="dc dcr"><h4>💭 SENTIMENT (complexe)</h4><p>Construit, mental, culturel. Interprétation filtrée par l'histoire. Heures à années.</p><p><em>Jalousie, nostalgie, honte, gratitude, mélancolie.</em></p></div></div><h3>Dans le vide</h3><p>La personne en vide a perdu le fil des émotions primaires — le signal corporel ne remonte plus. La guérison : <em>Qu'est-ce que mon corps ressent maintenant ?</em></p><blockquote>« Un sentiment est l'expérience mentale d'un état corporel. » — Antonio Damasio</blockquote>`},
  {id:'spiritual-void',icon:'✨',tags:['spiritualité'],rt:4,title:'Le vide comme portail spirituel',desc:'Zen, soufisme, mystique chrétienne : quand le vide devient chemin.',
   html:`<h3>Un portail, non un problème</h3><p>La différence avec le vide pathologique : l'un est subi avec angoisse, l'autre traversé avec conscience.</p><h3>Zen — Sunyata</h3><p>"C'est le vide au centre de la roue qui lui permet de tourner." Pleinement accepté, il devient espace de liberté.</p><h3>Soufisme — Rumi</h3><p>La flûte de roseau gémit d'être séparée de son origine. Ce manque <strong>produit la musique elle-même</strong>.</p><blockquote>« Écoute le roseau, comme il se plaint de la séparation. »</blockquote><h3>Nuit obscure de l'âme</h3><p>Saint Jean de la Croix : la sécheresse intérieure n'est pas un échec — c'est une invitation à aller plus profond.</p><h3>Jung — individuation</h3><p>Le vide est de la matière première non travaillée. L'invitation à devenir pleinement soi.</p>`},
  {id:'self-healing',icon:'🌱',tags:['pratique'],rt:6,title:'Outils d\'auto-guérison',desc:'Des pratiques concrètes pour retrouver le contact avec soi-même.',
   html:`<h3>La voie somatique</h3><p><strong>Cohérence cardiaque :</strong> 5s/5s, 3×/jour, 5 min. <strong>Mouvement expressif :</strong> danser librement. <strong>TRE :</strong> tremblements naturels libérant les tensions.</p><h3>La voie psychique</h3><p><strong>Écriture thérapeutique :</strong> flux de conscience, lettres non envoyées. <strong>IFS :</strong> dialoguer avec les parties intérieures. <strong>EFT :</strong> tapoter des méridiens pour déverrouiller des états figés.</p><h3>La voie contemplative</h3><p><strong>Pleine conscience :</strong> être avec le vide sans le fuir. <strong>Metta :</strong> bienveillance aimante à soi d'abord. <strong>Ancrage 5-4-3-2-1 :</strong> retour sensoriel au présent.</p><h3>La voie du sens</h3><p>Qu'est-ce qui a du sens pour <em>moi</em> ? Service aux autres. Contact régulier avec la nature.</p>`},
  {id:'body-memory',icon:'🫀',tags:['corps','trauma'],rt:5,title:'Le corps comme mémoire',desc:'Psychosomatique — comment le corps parle quand les mots manquent.',
   html:`<blockquote>« Le corps garde le score. » — Bessel van der Kolk</blockquote><h3>Zones et significations</h3><p><strong>Gorge :</strong> parole réprimée, mots ravalés, pleurs contenus. <strong>Cœur/poitrine :</strong> chagrins non pleurés, pertes, amour retenu. <strong>Plexus solaire :</strong> identité, peur existentielle. <strong>Ventre :</strong> sécurité fondamentale, traumatismes profonds. <strong>Épaules :</strong> poids porté pour les autres, hypervigilance. <strong>Mâchoires :</strong> colère muette, résistance.</p><h3>Écouter sans réparer</h3><p>Le scan corporel quotidien — simplement poser une attention douce sur chaque zone — est l'une des pratiques les plus accessibles. Non pour "réparer" mais pour <strong>simplement être là</strong>.</p>`},
  {id:'grief-void',icon:'🌙',tags:['deuil'],rt:5,title:'Deuils et vides',desc:'Les deuils non faits comme source principale du vide.',
   html:`<h3>Le deuil arrêté</h3><p>Le vide est très souvent un <strong>deuil arrêté à mi-chemin</strong> : relation, identité, idéal, version de soi, vie rêvée non vécue.</p><h3>Les deuils non reconnus</h3><p>— Deuil de l'enfance souhaitée · de la relation parentale non reçue · de versions de soi abandonnées · d'un système de sens effondré</p><h3>Traverser consciemment</h3><p>Les étapes de Kübler-Ross ne sont pas linéaires. Ce qui importe : <strong>laisser chaque étape être pleinement traversée</strong>. Les rituels sont essentiels.</p><blockquote>« Le deuil n'est pas la fin de l'amour. C'est l'amour qui n'a plus d'endroit où aller. »</blockquote>`},
  // ── NOUVEAUX ARTICLES ──────────────────────────────────────────
  {id:'nervous-system-kb',icon:'⚡',tags:['corps','SNV'],rt:5,title:'Le système nerveux et le vide',desc:'Nerf vague, théorie polyvagale, fenêtre de tolérance : pourquoi le corps se coupe.',
   html:`<h3>La théorie polyvagale (Stephen Porges)</h3>
<p>Notre système nerveux autonome ne connaît pas deux états (activé / au repos) mais <strong>trois</strong>, gouvernés par le nerf vague :</p>
<div class="dg"><div class="dc dcl"><h4>🟢 Ventral vague — Sécurité</h4><p>État de connexion, créativité, curiosité, présence. Possible seulement quand le système nerveux se sent <em>en sécurité</em>. C'est ici que la guérison a lieu.</p></div><div class="dc dcr"><h4>🔴 Sympathique — Mobilisation</h4><p>Fuite ou combat. Anxiété, agitation, hypervigilance. Le corps s'est senti menacé et s'est mobilisé pour survivre.</p></div></div>
<p>Troisième état : <strong>Dorsal vague — Effondrement.</strong> Shut-down, engourdissement, dissociation, vide. C'est la réponse du système nerveux aux menaces inévitables — quand ni la fuite ni le combat ne sont possibles. <em>Le vide émotionnel est très souvent un état dorsal vagal chronique.</em></p>
<h3>La fenêtre de tolérance (Daniel Siegel)</h3>
<p>Chaque personne dispose d'une "fenêtre" à l'intérieur de laquelle les émotions peuvent être traversées sans débordement. En dehors de cette fenêtre : hyperactivation (anxiété, agitation) ou hypoactivation (vide, dissociation, engourdissement).</p>
<p>Un trauma rétrécie cette fenêtre. Les pratiques somatiques — cohérence cardiaque, grounding, TRE, yoga — l'élargissent progressivement.</p>
<h3>Le nerf vague comme chemin de guérison</h3>
<p>Le nerf vague relie le cerveau à presque tous les organes. Sa branche ventrale active l'état de sécurité. On peut le stimuler directement par : la respiration lente et profonde, le chant ou le fredonnement, l'exposition à l'eau froide (douche fraîche sur le visage), le contact physique chaleureux, les sons graves.</p>
<blockquote>« La sécurité n'est pas l'absence de danger. C'est la présence d'une connexion. » — Stephen Porges</blockquote>`},

  {id:'shame-kb',icon:'🌑',tags:['honte','racines'],rt:5,title:'La honte et le vide',desc:'Brené Brown, la honte comme premier mécanisme créateur de vide.',
   html:`<h3>Honte vs culpabilité — une distinction capitale</h3>
<div class="dg"><div class="dc dcl"><h4>⚖️ Culpabilité</h4><p>"J'ai <em>fait</em> quelque chose de mauvais."</p><p>Oriente vers la réparation. Peut être saine.</p><p><em>Exemple : "J'aurais dû appeler."</em></p></div><div class="dc dcr"><h4>🌑 Honte</h4><p>"Je <em>suis</em> quelque chose de mauvais."</p><p>Paralyse. Isole. Nourrit le vide.</p><p><em>Exemple : "Je suis nul(le). Je ne mérite pas."</em></p></div></div>
<h3>La honte comme créatrice de vide</h3>
<p>La honte profonde pousse à <strong>se cacher</strong> — y compris de soi-même. Progressivement, les parties de soi associées à la honte sont éteintes, enfouies, niées. Ce retrait de pans entiers de soi crée précisément l'expérience du vide : l'impression d'être une coquille, de ne pas vraiment exister.</p>
<p>Brené Brown, chercheuse américaine, a passé vingt ans à étudier la honte. Sa conclusion : <strong>"La honte survit grâce au secret, au silence et au jugement. Elle ne peut survivre à l'empathie."</strong></p>
<h3>La honte dans le corps</h3>
<p>La honte a une posture : épaules rentrées, regard fuyant, poitrine affaissée, voix étouffée. Elle se vit d'abord dans le corps avant d'être nommée. Travailler la honte passe donc aussi par le corps — redresser la posture consciemment, nommer la honte à voix haute (même seul), mettre des mots là où il n'y en avait pas.</p>
<h3>Le chemin : de la honte à l'auto-compassion</h3>
<p>Kristin Neff a démontré que l'auto-compassion — se traiter avec la même gentillesse qu'on accorderait à un ami — est l'antidote direct à la honte. Trois composantes : bienveillance envers soi, reconnaissance de l'humanité commune ("je ne suis pas seul(e)"), pleine conscience (ni dramatiser ni nier).</p>
<blockquote>« La honte est la peur d'être indigne d'appartenance. » — Brené Brown</blockquote>`},

  {id:'toxic-relations-kb',icon:'🌀',tags:['relations','empathie'],rt:5,title:'Relations toxiques et vide émotionnel',desc:'Dynamiques narcissiques, pattern empathique-narcissique, comment certaines relations vident.',
   html:`<h3>Le paradoxe de la relation empathique-narcissique</h3>
<p>Certaines relations créent un vide précisément parce qu'elles sont <strong>asymétriques par construction</strong>. L'être ultra-empathique — naturellement orienté vers le besoin de l'autre — se retrouve attiré par des personnalités dont le besoin de validation est insatiable. Ce n'est pas un hasard : l'empathique a souvent appris que son rôle est de s'occuper des émotions des autres.</p>
<h3>Comment la relation vide</h3>
<p><strong>Invisibilisation progressive :</strong> les besoins, émotions et perceptions de l'empathique sont minimisés, niés ou retournés. Progressivement, il doute de sa propre réalité (<em>gaslighting</em>).</p>
<p><strong>Épuisement émotionnel constant :</strong> réguler les émotions de l'autre, gérer ses crises, anticiper ses humeurs — tout cela consomme une énergie considérable, laissant peu de place pour sa propre vie intérieure.</p>
<p><strong>Perte de soi par strates :</strong> pour préserver la paix ou la relation, l'empathique abandonne successivement ses goûts, ses valeurs, ses amitiés, puis ses émotions. Le vide qui s'installe est celui des parties de soi abandonnées.</p>
<h3>Reconnaître sans condamner</h3>
<p>Cette dynamique n'implique pas nécessairement une "mauvaise personne" — elle peut naître de deux histoires de blessures qui se sont trouvées. Mais la reconnaître est indispensable pour pouvoir sortir de la répétition.</p>
<h3>La reconstruction</h3>
<p>Après une relation de ce type, le travail de reconstruction passe par : retrouver ses propres goûts et valeurs (souvent oubliés), réapprendre à distinguer ses émotions de celles de l'autre (outil Filtre Empathique), et reconstruire une sécurité intérieure qui ne dépend plus de la validation externe.</p>
<blockquote>« Ce n'est pas votre sensibilité qui est le problème. C'est le système qui a appris à l'exploiter. »</blockquote>`}

  svgChart(results,max,color='#6B9E97'){

    const xs=rev.map((_,i)=>pd+i*(W-2*pd)/(rev.length-1));
    const ys=rev.map(r=>H-pd-(r.score/max)*(H-2*pd));
    const path='M '+xs.map((x,i)=>`${x},${ys[i]}`).join(' L ');
    const area=`M ${xs[0]},${H} L ${xs.map((x,i)=>`${x},${ys[i]}`).join(' L ')} L ${xs[xs.length-1]},${H} Z`;
    const dots=xs.map((x,i)=>`<circle cx="${x}" cy="${ys[i]}" r="4" fill="${color}" stroke="var(--bgs)" stroke-width="2"><title>${rev[i].score}/${max} — ${new Date(rev[i].date).toLocaleDateString('fr-FR')}</title></circle>`).join('');

  renderWheel(){
    const W=320,cx=160,cy=160,R=132,r=74;
    let slices='',labels='';
    TD.wheel.forEach(seg=>{
      const step=360/7,s=(seg.angle-step/2)*Math.PI/180,e=(seg.angle+step/2)*Math.PI/180;
      const x1=cx+R*Math.cos(s),y1=cy+R*Math.sin(s),x2=cx+R*Math.cos(e),y2=cy+R*Math.sin(e);
      const xi1=cx+r*Math.cos(s),yi1=cy+r*Math.sin(s),xi2=cx+r*Math.cos(e),yi2=cy+r*Math.sin(e);
      const mx=seg.angle*Math.PI/180,lx=cx+(R-26)*Math.cos(mx),ly=cy+(R-26)*Math.sin(mx);
      slices+=`<path d="M ${xi1} ${yi1} A ${r} ${r} 0 0 1 ${xi2} ${yi2} L ${x2} ${y2} A ${R} ${R} 0 0 0 ${x1} ${y1} Z" fill="${seg.color}" fill-opacity=".82" stroke="white" stroke-width="2" class="wslice" data-em="${seg.id}" style="cursor:pointer"/>`;
      labels+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="white" font-family="Georgia" pointer-events="none" transform="rotate(${seg.angle},${lx},${ly})">${seg.fr}</text>`;
    });
    const wh=Model.data.wheelHistory||[],freq={};
    wh.forEach(e=>{freq[e.emotion]=(freq[e.emotion]||0)+1;});
    const topFreq=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,12),maxF=topFreq[0]?.[1]||1;
    const freqHtml=topFreq.map(([e,c])=>{const seg=TD.wheel.find(s=>s.fr===e||s.sub?.some(x=>x.fr===e));const col=seg?.color||'#6B9E97';const sz=Math.round(11+(c/maxF)*10);return`<span class="wfreq-item" style="background:${col}22;color:${col};font-size:${sz}px;border:1px solid ${col}44" title="${c} fois">${e} <small style="opacity:.7">${c}</small></span>`;}).join('');
    return`<div class="ani">${V.bc([{label:'Outils',page:'tools'},{label:'Roue des Émotions'}])}<div class="ph fb"><div><h1>🎨 Roue des Émotions</h1><div class="psub">3 niveaux · historique de fréquence.</div></div><button class="btn bs bsm no-print" id="fbtn">⬛ Focus</button></div><div class="wwrap"><svg id="ewhl" viewBox="0 0 ${W} ${W}" xmlns="http://www.w3.org/2000/svg"><circle cx="${cx}" cy="${cy}" r="${r-2}" fill="var(--bgs)" stroke="var(--bdr)" stroke-width="1.5"/>${slices}${labels}<circle cx="${cx}" cy="${cy}" r="${r-2}" fill="var(--bgs)" stroke="var(--bdr)" stroke-width="1.5" pointer-events="none"/><text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="9" fill="var(--txm)" font-family="Georgia">Cliquez</text><text x="${cx}" y="${cy+8}" text-anchor="middle" font-size="9" fill="var(--txm)" font-family="Georgia">une zone</text></svg><div class="winfo" id="winfo"><span class="tm tf">Cliquez sur une émotion.</span></div><div id="wsub2" style="width:100%"></div><div id="wsub3" style="width:100%"></div><button class="btn bp bsm hidden" id="wlog">📔 Ajouter au journal</button></div>${topFreq.length?`<div class="wfreq-wrap mt16"><div class="tx tm mb8">Fréquences — ${wh.length} sélections</div><div class="wfreq-cloud">${freqHtml}</div></div>`:''}</div>`;
  },

  renderCheckin(step,ans){
    const qs=TD.checkinQs,total=qs.length;
    if(step>=total){
      const score=Object.values(ans).reduce((s,v)=>s+v,0);
      const ci=Model.data.checkins||[],recent=[...ci].slice(0,30).reverse();
      const maxB=recent.length?Math.max(...recent.map(c=>c.score)):20;
      // Courbe SVG 30 jours
      const W2=440,H2=70,pd2=8;
      let sparkline='';
      if(recent.length>1){
        const xs2=recent.map((_,i)=>pd2+i*(W2-2*pd2)/(recent.length-1));
        const ys2=recent.map(c=>H2-pd2-(c.score/20)*(H2-2*pd2));
        const path2='M '+xs2.map((x,i)=>`${x},${ys2[i]}`).join(' L ');
        const area2=`M ${xs2[0]},${H2} L ${xs2.map((x,i)=>`${x},${ys2[i]}`).join(' L ')} L ${xs2[xs2.length-1]},${H2} Z`;
        sparkline=`<svg viewBox="0 0 ${W2} ${H2+20}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:${H2+20}px;margin-top:12px"><defs><linearGradient id="spg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--p)" stop-opacity=".2"/><stop offset="100%" stop-color="var(--p)" stop-opacity="0"/></linearGradient></defs><path d="${area2}" fill="url(#spg)"/><path d="${path2}" fill="none" stroke="var(--p)" stroke-width="2" stroke-linejoin="round"/>${xs2.map((x,i,a)=>i===a.length-1?`<circle cx="${x}" cy="${ys2[i]}" r="4" fill="var(--p)"/>`:'').join('')}</svg>`;
      }
      return`<div class="ani ci-wrap"><div class="ph tc"><h1>⚡ Check-in du jour</h1></div><div class="card tc" style="padding:28px"><div style="font-family:var(--fd);font-size:3rem;color:var(--p);line-height:1">${score}</div><div class="tx tm mb8">/ 20</div><p class="ts tf mb0">Score du jour — plus élevé = intensité plus forte.</p>${sparkline}</div><div class="fc g8 mt24" style="justify-content:center;flex-wrap:wrap"><button class="btn bs" data-goto="dashboard">← Accueil</button><button class="btn bp" data-tool="${Intel.sugTool().id}">Outil suggéré →</button></div></div>`;
    }
    const q=qs[step],pct=Math.round((step/total)*100);
    return`<div class="ani ci-wrap"><div class="ph tc"><h1>⚡ Check-in du jour</h1></div><div class="tc tf tm mb16">Question ${step+1} / ${total}</div><div class="pb mb24"><div class="pf" style="width:${pct}%"></div></div><div class="qq"><div class="qqt">${q}</div><div class="so mt12">${[0,1,2,3,4].map(v=>`<div class="sopt${ans[step]===v?' sel':''}" data-civ="${v}">${v}</div>`).join('')}</div><div class="slbls"><span>Faible</span><span>Intense</span></div></div>${ans[step]!==undefined?`<div class="fc g8 mt16" style="justify-content:center"><button class="btn bp" data-cinext="${step}">${step<total-1?'Suivant →':'Voir le résultat'}</button></div>`:''}</div>`;

  go(page,extra=null){
    this.page=page;
    // Reset check-in quand on y navigue (sauf progression interne via data-cinext)
    if(page==='checkin'&&extra!=='continue'){this._ciStep=0;this._ciAns={};}
    document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('active',a.dataset.page===page));
    // Indicateur outil actif
    const ati=document.getElementById('ati');
    if(page.startsWith('tool-')){
      const tid=page.replace('tool-','');
      const t=TD.tools.find(x=>x.id===tid);
      if(ati&&t){ati.innerHTML=`<div class="ati-l">${t.icon} ${t.title}</div><div class="ati-s">En cours</div>`;ati.classList.add('show');}
      document.getElementById('fbar-name').textContent=t?.title||'Outil';
    }else{if(ati)ati.classList.remove('show');if(document.body.classList.contains('focus'))this.exitFocus();}
    this.render(page,extra);
    document.getElementById('sb').classList.remove('open');
    window.scrollTo(0,0);
  },

  render(page,extra){
    const el=document.getElementById('pc');let html='';
    if(page==='onboarding')html=V.renderOB(this._obStep,this._obAns);
    else if(page==='dashboard')html=V.renderDB();
    else if(page==='knowledge')html=V.renderKB(extra);
    else if(page==='assessments')html=V.renderAssessments();
    else if(page==='quiz')html=this.qs?V.renderQuiz(this.qs.id,this.qs.step,this.qs.ans):V.renderAssessments();
    else if(page==='quiz-result')html=this.qs?V.renderResult(this.qs.id,this.qs.score,this.qs.bt,this.qs.bd,this.qs.bc):'';
    else if(page==='tools')html=V.renderTools();
    else if(page==='toolhistory')html=V.renderTH();
    else if(page==='tool-breathing')html=V.renderBreathing();
    else if(page==='tool-wheel')html=V.renderWheel();
    else if(page==='tool-grounding')html=V.renderGrounding();
    else if(page==='tool-eft')html=V.renderEFT();
    else if(page==='tool-empathy')html=V.renderEmpathy();
    else if(page==='tool-ifs')html=V.renderIFS();
    else if(page==='tool-meditation')html=V.renderMed(extra,this._medStep);
    else if(page==='tool-unsent')html=V.renderUnsent();
    else if(page==='tool-bodyscan')html=V.renderBodyScan();
    else if(page==='tool-shadow')html=V.renderShadow();
    else if(page==='tool-mindmap'){html=V.renderMindMap();this._mmnodes=[];this._mmlinks=[];this._mmsel=null;}
    else if(page==='tool-gratitude')html=V.renderGratitude();
    else if(page==='tool-void-dialogue')html=V.renderVoidDialogue();
    else if(page==='tool-timeline')html=V.renderTimeline();
    else if(page==='tool-ifs-ai')html=V.renderIFSai();
    else if(page==='checkin'){
      // Réinitialiser si on arrive en début de parcours (step 0 = fresh start via nav)
      if(this._ciStep===undefined||this._ciStep>=TD.checkinQs.length){this._ciStep=0;this._ciAns={};}
      html=V.renderCheckin(this._ciStep,this._ciAns);
    }
    else if(page==='journal')html=V.renderJournal(this._jf);
    else if(page==='programs')html=V.renderPrograms(extra);
    else if(page==='settings')html=V.renderSettings();
    el.innerHTML=html;
    this.bindPage(page,extra);
  },

  // ── Breathing ──
  startBreath(){
    this._brun=true;
    const mode=document.getElementById('bmode')?.value||'55';
    const cycles=parseInt(document.getElementById('bcycles')?.value||'10');
    const phases={
      '55':[{n:'Inspirez',cls:'inh',d:5},{n:'Expirez',cls:'exh',d:5}],
      '478':[{n:'Inspirez',cls:'inh',d:4},{n:'Retenez',cls:'hld',d:7},{n:'Expirez',cls:'exh',d:8}],
      'box':[{n:'Inspirez',cls:'inh',d:4},{n:'Retenez',cls:'hld',d:4},{n:'Expirez',cls:'exh',d:4},{n:'Retenez',cls:'hld',d:4}]
    };
    const ph=phases[mode]||phases['55'];
    let cy=0,pi=0;
    const upd=()=>{
      if(!this._brun)return;
      const p=ph[pi%ph.length];
      if(pi>0&&pi%ph.length===0)cy++;
      if(cy>=cycles){this.stopBreath(true);return;}
      const c=document.getElementById('bcirc');if(c){c.className='bring '+p.cls;const l=document.getElementById('blbl');if(l)l.textContent=p.n;}
      const pe=document.getElementById('bphase');if(pe)pe.textContent=p.n;
      const cn=document.getElementById('bcnt');if(cn)cn.textContent=`Cycle ${cy+1} / ${cycles}`;
      let rem=p.d;const te=document.getElementById('btimer');if(te)te.textContent=rem;
      this._bint=setInterval(()=>{rem--;if(te)te.textContent=rem;if(rem<=0){clearInterval(this._bint);pi++;upd();}},1000);
    };
    upd();
  },
  stopBreath(complete=false){
    this._brun=false;clearInterval(this._bint);
    const c=document.getElementById('bcirc');if(c){c.className='bring';const l=document.getElementById('blbl');if(l)l.textContent='Toucher\npour commencer';}
    const pe=document.getElementById('bphase');if(pe)pe.textContent=complete?'Session terminée ✓':'';
    const te=document.getElementById('btimer');if(te)te.textContent='';
    if(complete)Model.logT('breathing');
  },

  // ── Wheel ──
  bindWheel(){
    const el=document.getElementById('pc');
    const svg=el.querySelector('#ewhl');if(!svg)return;
    svg.querySelectorAll('.wslice').forEach(sl=>sl.addEventListener('click',()=>{
      const em=TD.wheel.find(e=>e.id===sl.dataset.em);if(!em)return;
      this._wsel=em;
      const info=el.querySelector('#winfo');
      if(info)info.innerHTML=`<span style="display:inline-block;padding:2px 9px;border-radius:100px;font-size:.72rem;font-weight:700;background:${em.color}22;color:${em.color}">${em.type==='emotion'?'⚡ Émotion':'💭 Sentiment'}</span><br><span style="font-weight:600;color:${em.color}">${em.fr}</span>`;
      // Niveau 2

  // ── Mind Map ──
  bindMindMap(){
    const el=document.getElementById('pc');
    const canvas=el.querySelector('#mmcanvas'),svg=el.querySelector('#mmsvg');
    if(!canvas)return;
    // Restaurer depuis localStorage
    if(Model.data.mindmapNodes) this._mmnodes=JSON.parse(JSON.stringify(Model.data.mindmapNodes));
    if(Model.data.mindmapLinks) this._mmlinks=JSON.parse(JSON.stringify(Model.data.mindmapLinks));
    const saveMM=()=>{Model.data.mindmapNodes=this._mmnodes;Model.data.mindmapLinks=this._mmlinks;Model.save();};
    const render=()=>{
      // SVG links
      const links=this._mmlinks.map(l=>{
        const a=this._mmnodes[l[0]],b=this._mmnodes[l[1]];if(!a||!b)return'';
        return`<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="var(--bdr)" stroke-width="2"/>`;
      }).join('');
      svg.innerHTML=links;
      // Remove old nodes
      canvas.querySelectorAll('.mmnode').forEach(n=>n.remove());
      // Draw nodes
      this._mmnodes.forEach((n,i)=>{
        const size=[50,65,80,95][n.size-1]||65;
        const div=document.createElement('div');
        div.className='mmnode'+(this._mmsel===i?' msel':'');
        div.style.cssText=`width:${size}px;height:${size}px;background:${n.color};left:${n.x-size/2}px;top:${n.y-size/2}px;font-size:${Math.round(7+n.size*2)}px`;
        div.textContent=n.label;
        // Drag
        let dx=0,dy=0,dragging=false;
        div.addEventListener('mousedown',e=>{e.stopPropagation();dragging=true;dx=e.clientX-n.x;dy=e.clientY-n.y;});
        div.addEventListener('click',e=>{e.stopPropagation();
          if(this._mmsel===null){this._mmsel=i;}
          else if(this._mmsel===i){this._mmsel=null;}
          else{this._mmlinks.push([this._mmsel,i]);this._mmsel=null;}
          render();
        });
        div.addEventListener('touchstart',e=>{e.stopPropagation();const t=e.touches[0];dragging=true;dx=t.clientX-n.x;dy=t.clientY-n.y;},{passive:true});
        document.addEventListener('mousemove',e=>{if(!dragging)return;n.x=e.clientX-dx;n.y=e.clientY-dy;render();});
        document.addEventListener('mouseup',()=>{dragging=false;});
        document.addEventListener('touchmove',e=>{if(!dragging)return;const t=e.touches[0];n.x=t.clientX-dx;n.y=t.clientY-dy;render();},{passive:true});
        document.addEventListener('touchend',()=>{dragging=false;});
        canvas.appendChild(div);
      });
    };
    el.querySelector('#mm-add')?.addEventListener('click',()=>{
      const inp=el.querySelector('#mm-inp'),val=inp?.value.trim();if(!val)return;
      const rect=canvas.getBoundingClientRect();
      this._mmnodes.push({label:val,color:el.querySelector('#mm-col')?.value||'#6B9E97',size:parseInt(el.querySelector('#mm-size')?.value)||2,x:rect.width/2+(Math.random()-0.5)*100,y:rect.height/2+(Math.random()-0.5)*100});
      if(inp)inp.value='';saveMM();render();
    });
    el.querySelector('#mm-clr')?.addEventListener('click',()=>{this._mmnodes=[];this._mmlinks=[];this._mmsel=null;saveMM();render();});
    el.querySelector('#mm-sav')?.addEventListener('click',()=>{
      if(!this._mmnodes.length){alert('Ajoutez des émotions d\'abord.');return;}
      const labels=this._mmnodes.map(n=>n.label).join(', ');
      Model.addJ({emotion:'Carte mentale',type:'both',intensity:2,text:`🕸️ [Carte mentale]\nÉmotions : ${labels}\nLiens : ${this._mmlinks.length}`});
      Model.logT('mindmap');const b=el.querySelector('#mm-sav');if(b){b.textContent='✓ Sauvegardée';setTimeout(()=>{b.textContent='Sauvegarder';},2000);}
    });
    render();
  },

  renderTL(){
    const svg=document.getElementById('tl-svg');if(!svg)return;
    const events=this._tlEvents;const W=Math.max(600,events.length*80+100);
    svg.setAttribute('viewBox',`0 0 ${W} 160`);svg.style.minWidth=W+'px';
    if(!events.length){svg.innerHTML=`<text x="${W/2}" y="80" text-anchor="middle" font-size="13" fill="var(--txm)" font-family="Georgia">Aucun événement — ajoutez votre premier moment de vie</text>`;return;}
    const years=events.map(e=>e.year);
    const minY=Math.min(...years),maxY=Math.max(...years);
    const span=Math.max(maxY-minY,1);
    const pad=60,axisY=90;
    const colors={positive:'#6B9E97',negative:'#D4847A',neutral:'#C4A882',void:'#9B7EC8'};
    let html=`<line x1="${pad}" y1="${axisY}" x2="${W-pad}" y2="${axisY}" stroke="var(--bdr)" stroke-width="2"/>`;
    // Année min et max
    html+=`<text x="${pad}" y="${axisY+18}" text-anchor="middle" font-size="10" fill="var(--txm)">${minY}</text>`;
    if(maxY!==minY) html+=`<text x="${W-pad}" y="${axisY+18}" text-anchor="middle" font-size="10" fill="var(--txm)">${maxY}</text>`;
    events.forEach((ev,i)=>{
      const x=pad+(ev.year-minY)/span*(W-2*pad);
      const col=colors[ev.type]||'#6B9E97';
      const above=i%2===0;const textY=above?axisY-18:axisY+32;
      html+=`<circle cx="${x}" cy="${axisY}" r="9" fill="${col}" stroke="var(--bgs)" stroke-width="2" style="cursor:pointer" data-tl="${i}"/>`;
      html+=`<line x1="${x}" y1="${axisY}" x2="${x}" y2="${above?axisY-14:axisY+14}" stroke="${col}" stroke-width="1.5" stroke-dasharray="3,2"/>`;
      // Texte avec ellipsis
      const label=ev.label.length>14?ev.label.slice(0,13)+'…':ev.label;
      html+=`<text x="${x}" y="${textY}" text-anchor="middle" font-size="9.5" fill="var(--tx2)" font-family="Georgia" style="cursor:pointer" data-tl="${i}">${ev.year}</text>`;
      html+=`<text x="${x}" y="${above?textY-13:textY+13}" text-anchor="middle" font-size="9" fill="${col}" font-family="Georgia" style="cursor:pointer" data-tl="${i}">${label}</text>`;
    });
    svg.innerHTML=html;
    svg.querySelectorAll('[data-tl]').forEach(el2=>el2.addEventListener('click',()=>{
      const i=parseInt(el2.dataset.tl);this._tlSelected=i;
      const ev=this._tlEvents[i];
      const detail=document.getElementById('tl-detail');
      const title=document.getElementById('tl-detail-title');
      const note=document.getElementById('tl-note');
      if(detail)detail.classList.remove('hidden');
      if(title)title.textContent=`${ev.year} — ${ev.label}`;
      if(note)note.value=ev.note||'';
    }));
  },

  // ── Quiz finish ──
  finishQuiz(){
    const a=Assessments.getById(this.qs.id);
    let score,bt,bd,bc='#C4A882';
    if(a.multiDim){
      const ds={};
      a.dims.forEach((d,di)=>{
        // Polarité par dimension : certaines questions sont positives (score élevé = bon)
        ds[d.id]=d.qs.reduce((_,q,qi)=>{
          return _+(this.qs.ans[di*4+qi]||0);
        },0);
      });
      const top=Object.entries(ds).sort((a,b)=>b[1]-a[1])[0][0];
      const band=a.bands.find(b=>b.dim===top)||a.bands[0];
      bt=band.title;bd=band.desc;score=ds[top];
      Model.saveA(this.qs.id,{score,maxScore:16,bandTitle:bt,dimScores:ds});
    }else{
      // Scoring avec polarité : pol[] contient 1 pour les questions positives (inverser la valeur)
      score=Object.values(this.qs.ans).reduce((s,v,i)=>{
        const pol=(a.pol&&a.pol[i]===1)?4-(v||0):(v||0);
        return s+pol;
      },0);
      const band=a.bands.find(b=>score<=b.max)||a.bands[a.bands.length-1];
      bt=band.title;bd=band.desc;bc=band.color;
      Model.saveA(this.qs.id,{score,maxScore:a.max,bandTitle:bt});
    }
    Object.assign(this.qs,{score,bt,bd,bc});Model.cs();this.go('quiz-result');
  },

    const el=document.getElementById('pc');
    el.querySelectorAll('[data-theme-pick]').forEach(b=>b.addEventListener('click',()=>{
      const t=b.dataset.themePick;
      document.documentElement.setAttribute('data-theme',t);
      Model.data.meta=Model.data.meta||{};Model.data.meta.theme=t;Model.save();
      this.updateThemeBtn();this.render('settings');
    }));
    el.querySelector('#req-notif')?.addEventListener('click',async()=>{
      const ok=await Notifs.req();
      const s=el.querySelector('#notif-status');if(s)s.textContent=ok?'✓ Autorisées':'Refusées';
    });
    el.querySelector('#rem-en')?.addEventListener('change',e=>{Model.data.reminders=Model.data.reminders||{};Model.data.reminders.enabled=e.target.checked;Model.save();});
    el.querySelectorAll('.rem-time').forEach(inp=>inp.addEventListener('change',e=>{const i=parseInt(e.target.dataset.ri);Model.data.reminders.times=Model.data.reminders.times||[];Model.data.reminders.times[i]=e.target.value;Model.save();}));
    el.querySelector('#enc-en')?.addEventListener('click',async()=>{
      const p1=el.querySelector('#enc-p1')?.value,p2=el.querySelector('#enc-p2')?.value,hint=el.querySelector('#enc-hint')?.value||'';
      if(!p1||p1!==p2){alert('Les mots de passe ne correspondent pas.');return;}
      Model._pwd=p1;Model.data.encryption={enabled:true,hint};await Model.save();alert('Chiffrement activé. Exportez vos données en JSON comme sauvegarde.');this.render('settings');
    });
    el.querySelector('#enc-dis')?.addEventListener('click',async()=>{
      if(!confirm('Désactiver le chiffrement ?'))return;
      Model.data.encryption={enabled:false,hint:''};Model._pwd=null;await Model.save();this.render('settings');
    });
    el.querySelector('#sej')?.addEventListener('click',()=>Model.exportJSON());
    el.querySelector('#semd')?.addEventListener('click',()=>Model.exportMD());
    el.querySelector('#simp')?.addEventListener('click',()=>document.getElementById('ifile')?.click());
    el.querySelector('#sreset')?.addEventListener('click',()=>{if(confirm('Réinitialiser toutes les données ? Cette action est irréversible.')){Model.data=Model.def();Model.save();this.go('onboarding');}});
  },

  exitFocus(){document.body.classList.remove('focus');},

  updateThemeBtn(){
    const t=document.documentElement.getAttribute('data-theme')||'light';
    document.getElementById('btheme').textContent='🎨';
    const b2=document.getElementById('btheme2');if(b2)b2.textContent='🎨';
  },

  closeModal(){document.getElementById('mov').classList.remove('open');},

  bindGlobal(){
    // Theme picker (sidebar button → ouvre modal thèmes)
    document.getElementById('btheme')?.addEventListener('click',()=>this.go('settings'));
    document.getElementById('btheme2')?.addEventListener('click',()=>this.go('settings'));
    document.getElementById('bexp')?.addEventListener('click',()=>Model.exportJSON());
    document.getElementById('bexpmd')?.addEventListener('click',()=>Model.exportMD());
    document.getElementById('bimp')?.addEventListener('click',()=>document.getElementById('ifile')?.click());
    document.getElementById('ifile')?.addEventListener('change',e=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();
      r.onload=ev=>{if(Model.importJSON(ev.target.result)){document.documentElement.setAttribute('data-theme',Model.data.meta?.theme||'light');this.go('dashboard');}else alert('Fichier JSON invalide.');};
      r.readAsText(f);
    });
    document.getElementById('bmenu')?.addEventListener('click',()=>document.getElementById('sb').classList.toggle('open'));
    document.querySelectorAll('#nav a').forEach(a=>a.addEventListener('click',()=>{if(a.dataset.page)this.go(a.dataset.page);}));
    document.getElementById('mov')?.addEventListener('click',e=>{if(e.target.id==='mov')this.closeModal();});
    // Keyboard escape pour fermer modal et sortir du focus
    document.addEventListener('keydown',e=>{
      if(e.key==='Escape'){this.closeModal();this.exitFocus();return;}
      const tag=(e.target.tagName||'').toLowerCase();
      if(tag==='input'||tag==='textarea'||tag==='select')return;
      if(e.key==='j'||e.key==='J'){this.go('journal');}
      else if(e.key==='t'||e.key==='T'){this.go('tools');}
      else if(e.key==='n'||e.key==='N'){if(this.page==='journal')this.openJModal();}
      else if(e.key==='h'||e.key==='H'){this.go('dashboard');}
      else if(e.key==='f'||e.key==='F'){document.body.classList.toggle('focus');}
      else if(e.key===' '&&this.page==='tool-breathing'){
        e.preventDefault();
        if(this._brun)this.stopBreath();else this.startBreath();
      }
    });
  }
};

// ── LANCEMENT ────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>C.init());

document.addEventListener('DOMContentLoaded',()=>C.init());
</script>
